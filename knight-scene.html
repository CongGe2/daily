<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骑士 · 四幕 4K 实时渲染</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Inter',sans-serif; }
  canvas { display:block; }
  #ui {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:10; align-items:center; flex-wrap:wrap; justify-content:center;
  }
  #ui button {
    padding:10px 18px; border:1px solid rgba(255,255,255,0.15);
    background:rgba(0,0,0,0.65); color:#ddd; border-radius:3px;
    font-size:12px; cursor:pointer; backdrop-filter:blur(12px);
    transition:all .2s; letter-spacing:.05em; font-family:inherit;
  }
  #ui button:hover { border-color:rgba(255,255,255,0.4); color:#fff; }
  #ui button.active { border-color:#ffd740; color:#ffd740; background:rgba(255,215,64,0.12); }
  #ui .sep { width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 6px; }
  #loading {
    position:fixed; inset:0; display:flex; flex-direction:column; gap:12px;
    align-items:center; justify-content:center; background:#000; z-index:100;
    color:rgba(255,255,255,0.5); font-size:13px; letter-spacing:.06em;
  }
  #loading .bar { width:200px; height:2px; background:rgba(255,255,255,0.1); border-radius:1px; overflow:hidden; }
  #loading .bar div { height:100%; background:#ffd740; transition:width .3s; border-radius:1px; }
  #toast {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#ffd740; font-size:15px; letter-spacing:.08em;
    pointer-events:none; opacity:0; transition:opacity .3s; z-index:20;
  }
</style>
</head>
<body>

<div id="loading">
  <span id="load-text">加载 AI 场景图...</span>
  <div class="bar"><div id="load-bar" style="width:0%"></div></div>
</div>
<div id="toast">📸 4K 已保存</div>

<div id="ui">
  <button data-scene="0" class="active">🌅 晚霞</button>
  <button data-scene="1">🩸 血红</button>
  <button data-scene="2">☁️ 灰暗</button>
  <button data-scene="3">✨ 雨后光照</button>
  <span class="sep"></span>
  <button id="btn-play">▶ 自动播放</button>
  <button id="btn-shot">📸 4K截图</button>
  <button id="btn-rec">⏺ 录4K</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ── 4K Config ──
const W = 3840, H = 2160;

// ── Image URLs ──
const IMG_PATHS = [
  'images/knight/knight-v2-01-sunset.png',
  'images/knight/knight-v3-02-bloodsky.png',
  'images/knight/knight-v3-03-gloom.png',
  'images/knight/knight-v4-04-after-rain.png',
];

// ── Scene Data ──
const SCENES = [
  { name:'晚霞', particles:{color:'#ffd740',count:50,size:0.06,opacity:0.25,speed:0.3}, fogColor:'#d4a06a', fogDensity:0.00006, groundDarken:0.35, wetGround:0.0, beamOpacity:0 },
  { name:'血红', particles:{color:'#ff4444',count:80,size:0.05,opacity:0.35,speed:0.5}, fogColor:'#3a0a0a', fogDensity:0.00012, groundDarken:0.55, wetGround:0.0, beamOpacity:0 },
  { name:'灰暗', particles:{color:'#999999',count:25,size:0.04,opacity:0.12,speed:0.15}, fogColor:'#2a2a2a', fogDensity:0.00020, groundDarken:0.65, wetGround:0.0, beamOpacity:0 },
  { name:'雨后光照', particles:{color:'#ffd740',count:160,size:0.035,opacity:0.45,speed:0.25}, fogColor:'#3a3a40', fogDensity:0.00010, groundDarken:0.40, wetGround:0.55, beamOpacity:0.18 },
];

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true, alpha:false });
renderer.setSize(W, H, false);
renderer.setPixelRatio(1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

function fitPreview() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  renderer.domElement.style.width = (W*s)+'px';
  renderer.domElement.style.height = (H*s)+'px';
}
fitPreview();
window.addEventListener('resize', fitPreview);

const scene = new THREE.Scene();

// ── Camera ──
const camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 800);
camera.position.set(0, 8, 45);
camera.lookAt(0, -2, -30);

// ── Background plane (displays AI image) ──
const bgGeo = new THREE.PlaneGeometry(150, 84.375); // 16:9 at distance
const bgTex = new THREE.TextureLoader();
const bgMat = new THREE.MeshBasicMaterial({ map:null, depthTest:false, depthWrite:false });
const bgPlane = new THREE.Mesh(bgGeo, bgMat);
bgPlane.position.set(0, 10, -60);
bgPlane.renderOrder = -1;
scene.add(bgPlane);

// ── Ground plane ──
const groundGeo = new THREE.PlaneGeometry(200, 120, 100, 60);
// Subtle undulation
const gp = groundGeo.attributes.position;
for (let i=0; i<gp.count; i++) {
  const x=gp.getX(i), y=gp.getY(i);
  gp.setZ(i, Math.sin(x*0.03)*0.4 + Math.sin(y*0.04)*0.3 + Math.cos(x*0.06+y*0.05)*0.2);
}
groundGeo.computeVertexNormals();
const groundMat = new THREE.MeshStandardMaterial({ color:'#1a1a10', roughness:0.95, metalness:0, flatShading:true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.set(0, -17, -30);
scene.add(ground);

// Wet ground overlay
const wetGeo = new THREE.PlaneGeometry(200, 120);
const wetMat = new THREE.MeshBasicMaterial({ color:'#000', transparent:true, opacity:0, depthTest:true, depthWrite:false });
const wetPlane = new THREE.Mesh(wetGeo, wetMat);
wetPlane.rotation.x = -Math.PI/2;
wetPlane.position.set(0, -16.9, -30);
scene.add(wetPlane);

// ── Knight (3D silhouette) ──
const knightGroup = new THREE.Group();
// Body
const bodyGeo = new THREE.CylinderGeometry(0.25, 0.35, 2.2, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color:'#111', roughness:0.7, metalness:0.3 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 1.1;
knightGroup.add(body);
// Head/helmet
const headGeo = new THREE.SphereGeometry(0.28, 8, 6);
const head = new THREE.Mesh(headGeo, bodyMat);
head.position.y = 2.4;
knightGroup.add(head);
// Cape (long rectangle, animated)
const capeGeo = new THREE.PlaneGeometry(0.6, 4.5, 4, 12);
const capeMat = new THREE.MeshStandardMaterial({ color:'#1a1a1a', roughness:1, side:THREE.DoubleSide });
const cape = new THREE.Mesh(capeGeo, capeMat);
cape.position.set(0, 0.2, 0.4);
cape.rotation.x = 0.15;
knightGroup.add(cape);
// Sword
const bladeGeo = new THREE.BoxGeometry(0.08, 4, 0.06);
const bladeMat = new THREE.MeshStandardMaterial({ color:'#2a2a2a', roughness:0.4, metalness:0.7 });
const blade = new THREE.Mesh(bladeGeo, bladeMat);
blade.position.set(0.5, 0.3, -0.1);
knightGroup.add(blade);
const guardGeo = new THREE.BoxGeometry(0.6, 0.1, 0.12);
const guard = new THREE.Mesh(guardGeo, bladeMat);
guard.position.set(0.5, 2.2, -0.1);
knightGroup.add(guard);

knightGroup.scale.set(0.1, 0.1, 0.1); // tiny
knightGroup.position.set(-W*0.035, -14.5, -35);
scene.add(knightGroup);

// ── Light Beam (scene 4) ──
const beamGeo = new THREE.CylinderGeometry(0.3, 8, 180, 16, 1, true);
const beamMat = new THREE.MeshBasicMaterial({ color:'#ffddaa', transparent:true, opacity:0, depthWrite:false, side:THREE.DoubleSide });
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.copy(knightGroup.position);
beam.position.y += 90;
scene.add(beam);

// ── Lighting ──
const ambient = new THREE.AmbientLight('#554433', 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight('#ffccaa', 2.0);
sun.position.set(80, 60, -40);
scene.add(sun);

// ── Particles ──
let pts = null;
function makeParticles(cfg) {
  if (pts) { scene.remove(pts); pts.geometry.dispose(); pts.material.dispose(); }
  const g = new THREE.BufferGeometry();
  const arr = new Float32Array(cfg.count*3);
  for (let i=0; i<cfg.count; i++) {
    arr[i*3] = (Math.random()-0.5)*140;
    arr[i*3+1] = Math.random()*60 - 10;
    arr[i*3+2] = Math.random()*200 - 130;
  }
  g.setAttribute('position', new THREE.BufferAttribute(arr,3));
  const m = new THREE.PointsMaterial({ color:cfg.color, size:cfg.size, transparent:true, opacity:cfg.opacity, depthWrite:false, blending:THREE.AdditiveBlending });
  pts = new THREE.Points(g, m);
  scene.add(pts);
  return cfg;
}
let partCfg = SCENES[0].particles;

// ── Fog ──
scene.fog = new THREE.FogExp2('#d4a06a', 0.00006);

// ── State ──
let cur = 0, playing = false, timer = null, time = 0, rec = null, recChunks = [];

// ── Apply Scene ──
function applyScene(i) {
  const s = SCENES[i];
  partCfg = s.particles;
  makeParticles(s.particles);
  scene.fog = new THREE.FogExp2(s.fogColor, s.fogDensity);
  groundMat.color.set(new THREE.Color('#1a1a10').multiplyScalar(1 - s.groundDarken));
  wetMat.opacity = s.wetGround;
  beamMat.opacity = s.beamOpacity;
  sun.intensity = 1.5 + i * 0.2;
  ambient.intensity = 0.3 + i * 0.1;
  document.querySelectorAll('#ui button[data-scene]').forEach(b => b.classList.toggle('active', +b.dataset.scene===i));
  cur = i;
}

// ── Load image texture ──
function loadImage(path) {
  return new Promise((resolve, reject) => {
    bgTex.load(path,
      (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        resolve(tex);
      },
      undefined,
      () => reject(new Error('Failed: '+path))
    );
  });
}

// ── Animation ──
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Knight bob
  knightGroup.position.y = -14.5 + Math.sin(time*1.3)*0.2;
  knightGroup.position.z = -35 + Math.sin(time*0.6)*0.3;

  // Cape sway
  cape.rotation.z = Math.sin(time*1.5)*0.1;
  cape.rotation.x = 0.15 + Math.sin(time*1.1)*0.08;

  // Sword drag angle
  blade.rotation.z = -0.15 + Math.sin(time*0.8)*0.04;

  // Beam follows knight
  beam.position.x = knightGroup.position.x;
  beam.position.z = knightGroup.position.z;
  beam.position.y = knightGroup.position.y + 100;

  // Particles
  if (pts) {
    const arr = pts.geometry.attributes.position;
    for (let i=0; i<arr.count; i++) {
      arr.array[i*3+1] += (partCfg.speed + Math.random()*0.02) * 0.06;
      arr.array[i*3] += (Math.random()-0.5)*0.04;
      if (arr.array[i*3+1] > 50) arr.array[i*3+1] = -15;
    }
    arr.needsUpdate = true;
  }

  // Sky rotation for cloud drift
  bgPlane.position.x = Math.sin(time*0.03)*0.3;

  renderer.render(scene, camera);
}

// ── 4K Capture ──
function capture() {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.download = `knight-${SCENES[cur].name}-4k.png`;
  a.href = renderer.domElement.toDataURL('image/png');
  a.click();
  showToast('📸 4K PNG 已保存');
}

// ── Record ──
async function toggleRec() {
  const btn = document.getElementById('btn-rec');
  if (rec) {
    rec.stop();
    rec = null;
    btn.textContent = '⏺ 录4K';
    return;
  }
  const stream = renderer.domElement.captureStream(24);
  rec = new MediaRecorder(stream, { mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm', videoBitsPerSecond:50000000 });
  rec.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(recChunks, {type:'video/webm'});
    const a = document.createElement('a');
    a.download = `knight-${SCENES[cur].name}-4k.webm`;
    a.href = URL.createObjectURL(blob);
    a.click();
    recChunks = [];
    showToast('🎬 4K 视频已保存');
  };
  rec.start();
  btn.textContent = '⏹ 停止';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity='0', 1800);
}

// ── Play ──
function togglePlay() {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸ 停止' : '▶ 自动播放';
  if (playing) {
    let step = 0;
    applyScene(0);
    timer = setInterval(() => { step=(step+1)%4; applyScene(step); }, 5000);
  } else { clearInterval(timer); }
}

// ── Init ──
const loadBar = document.getElementById('load-bar');
const loadText = document.getElementById('load-text');
async function init() {
  // Load all 4 images
  for (let i=0; i<4; i++) {
    loadText.textContent = `加载 ${SCENES[i].name} 场景图...`;
    try {
      const tex = await loadImage(IMG_PATHS[i]);
      SCENES[i].texture = tex;
      loadBar.style.width = ((i+1)/4*100)+'%';
    } catch(e) {
      console.error('Load error:', e.message);
      // Use first loaded texture as fallback
      SCENES[i].texture = SCENES[0]?.texture || null;
      loadBar.style.width = ((i+1)/4*100)+'%';
    }
  }

  // Set initial texture
  bgMat.map = SCENES[0].texture;
  bgMat.needsUpdate = true;

  document.getElementById('loading').style.display = 'none';
  applyScene(0);
  animate();
}
init();

// ── Events ──
document.querySelectorAll('#ui button[data-scene]').forEach(b => {
  b.addEventListener('click', () => {
    if (playing) togglePlay();
    const i = +b.dataset.scene;
    bgMat.map = SCENES[i].texture;
    bgMat.needsUpdate = true;
    applyScene(i);
  });
});
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-shot').addEventListener('click', capture);
document.getElementById('btn-rec').addEventListener('click', toggleRec);

window.addEventListener('keydown', e => {
  if (e.key>='1' && e.key<='4') { if(playing)togglePlay(); const i=+e.key-1; bgMat.map=SCENES[i].texture; bgMat.needsUpdate=true; applyScene(i); }
  if (e.key===' ') { e.preventDefault(); togglePlay(); }
  if (e.key==='s'||e.key==='S') capture();
  if (e.key==='r'||e.key==='R') toggleRec();
});

console.log('⚔️ Knight 4K Ready — AI backgrounds + 3D ground + animated knight');
</script>
</body>
</html>

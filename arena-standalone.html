<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Eclipse Arena · 星蚀竞技场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0808;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;user-select:none;-webkit-user-select:none;color:#c8b898}
canvas{display:block;position:absolute;inset:0}
.m{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:18px;background:#0a0808}
.m.h{display:none}
.m h1{font-size:clamp(26px,5vw,40px);font-weight:900;color:#c8a050;text-shadow:0 0 40px rgba(200,160,80,.3)}
.m .sub{font-size:11px;color:rgba(200,180,150,.35);margin-bottom:4px}
.chars{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.card{width:115px;padding:16px 10px 12px;border-radius:14px;cursor:pointer;text-align:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:all .25s;position:relative}
.card:hover{transform:translateY(-4px);background:rgba(255,255,255,.06)}
.card.open:hover{border-color:#c8a050;box-shadow:0 0 30px rgba(200,160,80,.1)}
.card.locked{cursor:not-allowed;opacity:.4}
.card.locked:hover{transform:none;background:rgba(255,255,255,.03)}
.av{width:52px;height:52px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:30px}
.warr .av{background:linear-gradient(135deg,rgba(220,80,40,.25),rgba(200,120,80,.1))}
.arch .av{background:linear-gradient(135deg,rgba(80,200,160,.25),rgba(60,180,200,.1))}
.locked .av{filter:brightness(0)}
.card .cn{font-size:13px;font-weight:700}
.card .cd{font-size:10px;color:rgba(200,180,150,.4)}
.licon{position:absolute;top:6px;right:8px;font-size:11px}
.lvl-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;max-width:480px}
.lc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:all .12s}
.lc.o{color:#c8b898;background:rgba(200,160,80,.08);border-color:rgba(200,160,80,.15)}
.lc.o:hover{background:rgba(200,160,80,.2);transform:scale(1.07)}
.lc.lk{color:rgba(255,255,255,.08);cursor:not-allowed}
.lc.do{color:#5a5;background:rgba(80,200,80,.05);border-color:rgba(80,200,80,.1)}
.mbtn{padding:8px 20px;border-radius:14px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.04);color:rgba(200,180,150,.5);border:1px solid rgba(255,255,255,.06);transition:all .15s}
.mbtn:hover{background:rgba(255,255,255,.08)}
.mbtn.gold{background:rgba(200,160,80,.08);color:#c8a050;border-color:rgba(200,160,80,.15)}
.mbtn.gold:hover{background:rgba(200,160,80,.18)}
.hint{font-size:10px;color:rgba(200,180,150,.25);margin-top:4px}

#go,#win{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:25;gap:14px;background:rgba(8,6,4,.92)}
#go.h,#win.h{display:none}
#go .t{font-size:40px;font-weight:900;color:#c44}
#win .t{font-size:36px;font-weight:900;color:#5c5}
#go .sc{font-size:44px;font-weight:900;color:#c8a050}
.btn{padding:13px 36px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn.gold{background:#c8a050;color:#1a1008}
.btn.ghost{background:rgba(255,255,255,.05);color:rgba(200,180,150,.5)}
.btn.green{background:#5c5;color:#0a0a08}
.btn:hover{transform:scale(1.04)}

#bestiary{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:50px 20px;z-index:30;background:rgba(8,6,4,.97);overflow-y:auto}
#bestiary.h{display:none}
#bestiary h2{font-size:24px;font-weight:900;color:#c8a050;margin-bottom:4px}
.best-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;max-width:650px;margin:16px auto}
.best-cell{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);border-radius:6px;padding:10px 4px;text-align:center;font-size:9px}
.best-cell.known{border-color:rgba(255,255,255,.08)}
.best-cell .tic{font-size:20px;display:block}
.best-cell .tnm{font-size:9px;color:rgba(200,180,150,.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- CHAR SELECT -->
<div class="m" id="m1"><div>
  <h1>ECLIPSE ARENA</h1>
  <div class="sub">第一步 · 选择角斗士</div>
  <div class="chars">
    <div class="card warr open" onclick="selChar('warrior')"><div class="av">⚔️</div><div class="cn">战 士</div><div class="cd">近战 · 大范围挥砍</div></div>
    <div class="card arch open" onclick="selChar('archer')"><div class="av">🏹</div><div class="cn">射 手</div><div class="cd">远程 · 高机动</div></div>
    <div class="card locked"><div class="av">🔮</div><div class="cn">法 师</div><div class="cd">???</div><div class="licon">🔒</div></div>
    <div class="card locked"><div class="av">🗡️</div><div class="cn">刺 客</div><div class="cd">???</div><div class="licon">🔒</div></div>
    <div class="card locked"><div class="av">🛡️</div><div class="cn">骑 士</div><div class="cd">???</div><div class="licon">🔒</div></div>
    <div class="card locked"><div class="av">💀</div><div class="cn">术 士</div><div class="cd">???</div><div class="licon">🔒</div></div>
  </div>
</div></div>

<!-- LEVEL SELECT -->
<div class="m h" id="m2"><div>
  <h1 id="m2t">选择关卡</h1>
  <div class="sub">第二步 · 1-100关 逐个解锁</div>
  <div class="lvl-grid" id="lg"></div>
  <div class="hint">WASD移动 · 鼠标攻击(射手瞄向光标) · Ctrl潜行 · 1/2/3用道具 · Space/E技能</div><br>
  <button class="mbtn gold" onclick="showBestiary()">📖 怪物图鉴</button>
  <button class="mbtn" onclick="backToPick()">← 换角色</button>
</div></div>

<!-- BESTIARY -->
<div class="h" id="bestiary">
  <h2>📖 怪物图鉴</h2>
  <div class="sub" style="text-align:center">5种类型 × 7级颜色 = 35种 · 击杀记录</div>
  <div class="best-grid" id="bg"></div>
  <button class="mbtn" onclick="hideBestiary()">← 返回</button>
</div>

<!-- GAME OVER -->
<div class="h" id="go">
  <div class="t">战 败</div>
  <div class="sc" id="goSc">0</div>
  <div class="sub" id="goDt"></div>
  <button class="btn gold" onclick="retryLevel()">↺ 重试</button>
  <button class="btn ghost" onclick="backToLevels()">← 选关</button>
</div>

<!-- WIN -->
<div class="h" id="win">
  <div class="t">✨ 通关！</div>
  <div class="sub" id="winTxt"></div>
  <button class="btn green" onclick="nextLevel()">▶ 下一关</button>
  <button class="btn ghost" onclick="backToLevels()">← 选关</button>
</div>

<script>
// ============================================================
// ECLIPSE ARENA · 100 LEVELS · 35 ENEMIES · BESTIARY
// ============================================================
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function R(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}R();onresize=R;

// Audio
let ac;
function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.025){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.2,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

// Characters
const CH={warrior:{n:'战士',ico:'⚔️',c:'#e85a30',hp:160,sp:2.2,ar:85,ad:42,aa:2.2,acd:28},
          archer:{n:'射手',ico:'🏹',c:'#4ad8b0',hp:85,sp:2.8,ar:420,ad:28,aa:0,acd:18}};

// 7 color tiers — higher tier = faster + tougher
const TIERS=[
  {n:'白',c:'#e8e0d8',m:1.0,e:'⬜',u:1,spd:0.7},
  {n:'绿',c:'#80d880',m:1.3,e:'🟩',u:2,spd:0.85},
  {n:'蓝',c:'#68a8e8',m:1.6,e:'🟦',u:4,spd:1.0},
  {n:'紫',c:'#b070e0',m:2.0,e:'🟪',u:6,spd:1.2},
  {n:'金',c:'#e0b840',m:2.5,e:'🟨',u:9,spd:1.45},
  {n:'橙',c:'#e87830',m:3.2,e:'🟧',u:13,spd:1.7},
  {n:'红',c:'#e03030',m:4.0,e:'🟥',u:18,spd:2.0}];

// 5 enemy types
const ETB=[
  {n:'步兵',ai:'melee',hp:32,sp:1.3,sz:10,dmg:10,sc:100,sh:'tri'},
  {n:'弓兵',ai:'ranged',hp:24,sp:.9,sz:9,dmg:7,sc:120,sh:'rect',sm:90},
  {n:'狂战',ai:'berserk',hp:20,sp:3.0,sz:8,dmg:16,sc:180,sh:'circ'},
  {n:'重装',ai:'tank',hp:75,sp:.7,sz:18,dmg:22,sc:300,sh:'hex'},
  {n:'萨满',ai:'shaman',hp:42,sp:1.0,sz:11,dmg:5,sc:250,sh:'diam',hm:150}];

const IT=[
  {n:'生命药水',ico:'❤️',c:'#f44',ef:'heal',v:45},
  {n:'速度药剂',ico:'💨',c:'#4af',ef:'speed',v:1.7,dur:280},
  {n:'力量药剂',ico:'💪',c:'#fa0',ef:'dmg',v:1.5,dur:220},
  {n:'护盾',ico:'🛡️',c:'#fff',ef:'shield',v:1,dur:180}];

// Irregular polygon arena shapes — each is an array of [x,y] vertices
const MAP_SHAPES=[
  {v:[[-100,-70],[100,-70],[120,0],[100,70],[-100,70],[-120,0]],n:'六角竞技场'},
  {v:[[-90,-80],[0,-110],[90,-80],[90,80],[0,110],[-90,80]],n:'钻石擂台'},
  {v:[[-110,-50],[-40,-80],[40,-80],[110,-50],[110,50],[40,80],[-40,80],[-110,50]],n:'八角笼'},
  {v:[[-80,-90],[80,-90],[110,-30],[80,30],[110,90],[-110,90],[-80,30],[-110,-30]],n:'十字战场'},
  {v:[[-100,-60],[-30,-100],[30,-100],[100,-60],[100,60],[30,100],[-30,100],[-100,60]],n:'星形场地'},
  {v:[[-120,-40],[-60,-90],[60,-90],[120,-40],[90,20],[60,70],[-60,70],[-90,20]],n:'沙漏斗场'},
  {v:[[-100,-90],[0,-110],[100,-90],[120,0],[60,40],[-60,40],[-120,0]],n:'箭头竞技'},
  {v:[[-80,-100],[80,-100],[80,-30],[40,0],[80,30],[80,100],[-80,100],[-80,30],[-40,0],[-80,-30]],n:'蝴蝶形'},
];
let arenaVerts=[[-100,-70],[100,-70],[120,0],[100,70],[-100,70],[-120,0]],arenaName='竞技场';
function pickMap(lv){const m=MAP_SHAPES[(lv-1)%MAP_SHAPES.length];arenaVerts=m.v;arenaName=m.n}

// Point-in-polygon using ray casting
function insidePolygon(x,y,verts){
  let inside=false;
  for(let i=0,j=verts.length-1;i<verts.length;j=i++){
    const xi=verts[i][0],yi=verts[i][1],xj=verts[j][0],yj=verts[j][1];
    if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)inside=!inside;
  }
  return inside;
}

// Clamp entity to within polygon
function clampToArena(ex,ey,margin=4){
  if(insidePolygon(ex,ey,arenaVerts))return[ex,ey];
  // Find nearest point on polygon edge
  let bestX=ex,bestY=ey,bestDist=Infinity;
  for(let i=0,j=arenaVerts.length-1;i<arenaVerts.length;j=i++){
    const ax=arenaVerts[j][0],ay=arenaVerts[j][1],bx=arenaVerts[i][0],by=arenaVerts[i][1];
    const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
    let t=((ex-ax)*dx+(ey-ay)*dy)/len2;t=Math.max(0,Math.min(1,t));
    const px=ax+t*dx,py=ay+t*dy;
    const dist=Math.hypot(ex-px,ey-py);
    if(dist<bestDist){bestDist=dist;bestX=px+dx/Math.sqrt(len2)*margin;bestY=py+dy/Math.sqrt(len2)*margin}
  }
  return[bestX,bestY];
}

// Get random point inside polygon
function randomInsidePolygon(){
  // Find bounding box
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  arenaVerts.forEach(v=>{minX=Math.min(minX,v[0]);maxX=Math.max(maxX,v[0]);minY=Math.min(minY,v[1]);maxY=Math.max(maxY,v[1])});
  for(let tries=0;tries<50;tries++){
    const x=minX+Math.random()*(maxX-minX),y=minY+Math.random()*(maxY-minY);
    if(insidePolygon(x,y,arenaVerts))return[x,y];
  }
  return[0,0]; // fallback
}
let ck,cd,run=false,f=0,clevel=1;
let p={alive:false},e=[],pr=[],pa=[],ft=[],ef=[],it=[],sc=0,ki=0;
let backpack=[],backpackMax=3;
let camX=0,camY=0,sx=0,sy=0,si=0;
let bestiary={},maxUnlocked=1,levelEnemies=0,levelKilled=0;

// Input
const k={},m={x:0,y:0,d:false};
onkeydown=e=>{k[e.key.toLowerCase()]=true;if(k.control||k.ctrl)e.preventDefault();ia()};
onkeyup=e=>{k[e.key.toLowerCase()]=false};
canvas.onmousemove=e=>{m.x=e.clientX;m.y=e.clientY};
canvas.onmousedown=e=>{if(e.button===0){m.d=true;ia()}};
canvas.onmouseup=e=>{if(e.button===0)m.d=false};
canvas.oncontextmenu=e=>e.preventDefault();

// Save
function sv(){localStorage.setItem('ea4-save',JSON.stringify({maxUnlocked,bestiary}))}
function ld(){try{const d=JSON.parse(localStorage.getItem('ea4-save'));if(d){maxUnlocked=d.maxUnlocked||1;bestiary=d.bestiary||{}}}catch(e){}}
ld();

// ============== HELPERS ==============
function sp(x,y,n,c,s=3,l=16,z=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=Math.random()*s+s*.3;pa.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,l,maxL:l,c,size:Math.random()*z+z*.5})}}
function se(x,y,r,c){ef.push({x,y,r:0,mr:r,c,l:14})}
function sf2(x,y,t,c='#fff'){ft.push({x,y,t,c,l:35,vy:-2.5})}
function asi(i){si=Math.max(si,i)}
function ek(ti,ti2){return ti+'-'+ti2}

// ============== MENUS ==============
function selChar(key){ck=key;cd=CH[key];ia();document.getElementById('m1').classList.add('h');document.getElementById('m2').classList.remove('h');document.getElementById('m2t').textContent=cd.ico+' '+cd.n+' · 选关卡';buildLvlGrid()}
function backToPick(){document.getElementById('m2').classList.add('h');document.getElementById('m1').classList.remove('h')}
function backToLevels(){run=false;hideAll();document.getElementById('m2').classList.remove('h');buildLvlGrid()}
function hideAll(){['m1','m2','go','win','bestiary'].forEach(id=>document.getElementById(id).classList.add('h'))}

function buildLvlGrid(){
  const g=document.getElementById('lg');g.innerHTML='';
  for(let i=1;i<=100;i++){
    const c=document.createElement('div');c.className='lc';
    if(i<=maxUnlocked){c.classList.add('o');c.textContent=i;c.onclick=()=>startLevel(i)}
    else{c.classList.add('lk');c.textContent='🔒'}
    if(i<maxUnlocked)c.classList.add('do');
    g.appendChild(c);
  }
}

function showBestiary(){
  document.getElementById('m2').classList.add('h');document.getElementById('bestiary').classList.remove('h');
  const g=document.getElementById('bg');g.innerHTML='';
  for(let ti=0;ti<TIERS.length;ti++)for(let ei=0;ei<ETB.length;ei++){
    const k2=ek(ei,ti),cnt=bestiary[k2]||0,cell=document.createElement('div');
    cell.className='best-cell'+(cnt>0?' known':'');cell.innerHTML=`<span class="tic">${TIERS[ti].e}</span><span style="color:${TIERS[ti].c}">${ETB[ei].n}</span><br><span class="tnm">${TIERS[ti].n}级 · ${cnt>0?'✓ '+cnt:'???'}</span>`;g.appendChild(cell)}
}
function hideBestiary(){document.getElementById('bestiary').classList.add('h');document.getElementById('m2').classList.remove('h');buildLvlGrid()}

// ============== START LEVEL ==============
function startLevel(lv){
  clevel=lv;pickMap(lv);ia();hideAll();initP();e=[];pr=[];pa=[];ft=[];ef=[];it=[];backpack=[];camX=0;camY=0;sc=0;ki=0;levelKilled=0;
  levelEnemies=Math.floor(3+lv*1.5);
  for(let i=0;i<levelEnemies;i++)sE();
  for(let i=0;i<3+Math.floor(Math.random()*3);i++)spI();
  run=true;f=0;
}

function initP(){p={x:0,y:0,hp:cd.hp,mh:cd.hp,dx:0,dy:1,ang:Math.PI/2,stealth:false,at:0,acd:0,inv:0,s1cd:0,s2cd:0,dt:0,dvx:0,dvy:0,det:0,alive:true,sb:0,db:0,shT:0}}

// ============== SPAWN ==============
function selTier(){const avail=TIERS.filter(t=>t.u<=clevel);const wts=avail.map((t,i)=>Math.max(1,avail.length-i));const tw=wts.reduce((a,b)=>a+b,0);let r=Math.random()*tw;for(let i=0;i<avail.length;i++){r-=wts[i];if(r<=0)return TIERS.indexOf(avail[i])}return TIERS.indexOf(avail[avail.length-1])}
function sE(){// Spawn from polygon edge, immediately heading toward player
  const edge=Math.floor(Math.random()*arenaVerts.length);
  const j=(edge+1)%arenaVerts.length;
  const t=Math.random();
  const x=arenaVerts[edge][0]+(arenaVerts[j][0]-arenaVerts[edge][0])*t;
  const y=arenaVerts[edge][1]+(arenaVerts[j][1]-arenaVerts[edge][1])*t;
  const ang=Math.atan2(p.y-y,p.x-x);
  const et=ETB[Math.floor(Math.random()*ETB.length)],ti=selTier(),tr=TIERS[ti],mul=tr.m;
  e.push({x:x+Math.cos(ang)*30,y:y+Math.sin(ang)*30,hp:Math.floor(et.hp*mul+clevel*2),mh:Math.floor(et.hp*mul+clevel*2),sp:et.sp*tr.spd,sz:et.sz,dmg:Math.floor(et.dmg*mul+.5*clevel),co:tr.c,sc:Math.floor(et.sc*mul),ai:et.ai,sh:et.sh,ti,ei:ETB.indexOf(et),shCD:0,shM:et.sm||0,hCD:0,hM:et.hm||0,stun:0,alive:true,steT:0})}
function spI(){const[rx,ry]=randomInsidePolygon();const t=IT[Math.floor(Math.random()*IT.length)];it.push({x:rx,y:ry,type:t,l:380+Math.random()*220})}

// ============== DAMAGE ==============
function dmgE(e2,dmg){e2.hp-=dmg;e2.stun=8;e2.state='chase';e2.det=100;sp(e2.x,e2.y,5,e2.co,3,8,2);sf2(e2.x,e2.y-8,Math.round(dmg));asi(2);if(e2.hp<=0){e2.alive=false;se(e2.x,e2.y,e2.sz*3,e2.co);sp(e2.x,e2.y,12,e2.co,5,14);sf2(e2.x,e2.y-16,'+'+e2.sc,cd.c);sc+=e2.sc;ki++;levelKilled++;bestiary[ek(e2.ei,e2.ti)]=(bestiary[ek(e2.ei,e2.ti)]||0)+1;asi(3)}}

// ============== INVENTORY ==============
function pickupItem(o,idx){
  if(backpack.length<backpackMax){backpack.push(o.type);sf2(o.x,o.y-5,'📦 '+o.type.n,o.type.c)}else{useItem(o.type)}
  it.splice(idx,1);
}
function useItem(t){
  if(t.ef==='heal')p.hp=Math.min(p.mh,p.hp+t.v);
  else if(t.ef==='speed')p.sb=t.dur||280;
  else if(t.ef==='dmg')p.db=t.dur||220;
  else if(t.ef==='shield')p.shT=t.dur||180;
  sf2(p.x,p.y-5,t.ico+' '+t.n+'!',t.c);
}

// ============== GAME OVER / WIN ==============
function gameOver(){run=false;se(p.x,p.y,140,'#f44');sp(p.x,p.y,50,'#fff',7,28);asi(16);document.getElementById('go').classList.remove('h');document.getElementById('goSc').textContent=sc;document.getElementById('goDt').textContent='关卡 '+clevel+' · '+cd.n+' · 击杀 '+ki}
function levelClear(){run=false;if(clevel>=maxUnlocked){maxUnlocked=clevel+1;sv()}document.getElementById('win').classList.remove('h');document.getElementById('winTxt').textContent='第 '+clevel+' 关 · '+cd.n+' · '+sc+' 分 · '+ki+' 击杀'}
function retryLevel(){document.getElementById('go').classList.add('h');startLevel(clevel)}
function nextLevel(){document.getElementById('win').classList.add('h');startLevel(clevel+1)}

// ============== UPDATE ==============
function ps(){return p.stealth?6:14}
function hitP(dmg){if(p.shT>0)return;p.hp-=dmg;p.inv=26;sp(p.x,p.y,10,'#f44',6,14,3);sf2(p.x,p.y-8,'-'+Math.round(dmg),'#f44');asi(7);if(p.hp<=0){p.hp=0;p.alive=false;gameOver()}}

function U(dt){
  if(!run)return;f++;dt=Math.min(dt,.15);
  if(p.acd>0)p.acd-=dt*60;if(p.at>0)p.at-=dt;if(p.s1cd>0)p.s1cd--;if(p.s2cd>0)p.s2cd--;if(p.inv>0)p.inv--;
  if(p.sb>0)p.sb-=dt*60;if(p.db>0)p.db-=dt*60;if(p.shT>0)p.shT-=dt*60;
  p.stealth=k.control||k.ctrl;const bsp=cd.sp*(p.sb>0?1.7:1),spd=bsp*(p.stealth?.4:1);
  if(p.dt>0){p.x+=p.dvx*dt;p.y+=p.dvy*dt;p.dt--;sp(p.x,p.y,1,cd.c,2,4)}
  let mx=0,my=0;if(k.w||k.arrowup)my=-1;if(k.s||k.arrowdown)my=1;if(k.a||k.arrowleft)mx=-1;if(k.d||k.arrowright)mx=1;
  if(mx||my){const l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;p.dx=mx;p.dy=my;p.ang=Math.atan2(my,mx)}
  if(p.dt<=0){p.x+=mx*spd*dt*60;p.y+=my*spd*dt*60}
  const[pnx,pny]=clampToArena(p.x,p.y,AM);p.x=pnx;p.y=pny;
  let sf=1;if(p.stealth)sf*=.25;if(sf<.4)p.det=Math.max(0,p.det-dt*22);else p.det=Math.min(100,p.det+sf*dt*45);
  // Auto-pickup items when close, or F to pickup, or 1-3 to use from backpack
  for(let i=it.length-1;i>=0;i--){const o=it[i];if(Math.hypot(o.x-p.x,o.y-p.y)<6){pickupItem(o,i);break}}
  if(k.f){k.f=false;for(let i=it.length-1;i>=0;i--){const o=it[i];if(Math.hypot(o.x-p.x,o.y-p.y)<8){pickupItem(o,i);break}}}
  // Use backpack items with 1/2/3
  if(k['1']&&backpack.length>0){k['1']=false;useItem(backpack.shift())}
  if(k['2']&&backpack.length>0){k['2']=false;useItem(backpack.shift())}
  if(k['3']&&backpack.length>0){k['3']=false;useItem(backpack.shift())}
  it=it.filter(o=>{o.l-=dt*60;return o.l>0});
  const edmg=cd.ad*(p.db>0?1.5:1);
  if(m.d&&p.acd<=0&&p.dt<=0){ia();p.acd=cd.acd;p.at=.22;if(ck==='warrior'){e.forEach(e2=>{if(!e2.alive)return;const dx=e2.x-p.x,dy=e2.y-p.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);let diff=ang-p.ang;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;if(dist<cd.ar&&Math.abs(diff)<cd.aa/2){dmgE(e2,edmg);e2.x+=Math.cos(ang)*7;e2.y+=Math.sin(ang)*7}})}else{const ma=Math.atan2(m.y-H/2,m.x-W/2);for(let b=-1;b<=1;b++){const a=ma+b*Math.PI/12;pr.push({x:p.x,y:p.y,vx:Math.cos(a)*12,vy:Math.sin(a)*12,dmg:edmg,co:cd.c,l:60,ar:true})}}}
  if((k[' ']||k.space)&&p.s1cd<=0){k[' ']=false;k.space=false;p.s1cd=130;ia();if(ck==='warrior'){p.dt=10;p.dvx=Math.cos(p.ang)*17;p.dvy=Math.sin(p.ang)*17;p.inv=10;sfx(600,.06,'triangle');e.forEach(e2=>{if(!e2.alive)return;if(Math.hypot(e2.x-p.x,e2.y-p.y)<100){dmgE(e2,edmg*1.5);e2.stun=14}})}else{p.dt=8;p.dvx=Math.cos(p.ang)*15;p.dvy=Math.sin(p.ang)*15;p.inv=8;sfx(600,.06,'triangle')}}
  if(k.e&&p.s2cd<=0){k.e=false;p.s2cd=180;ia();if(ck==='warrior'){sfx(30,.2,'sawtooth',.12);se(p.x,p.y,120,'#fff');sp(p.x,p.y,28,cd.c,7,22);asi(12);e.forEach(e2=>{if(!e2.alive)return;if(Math.hypot(e2.x-p.x,e2.y-p.y)<120){dmgE(e2,edmg*2.5);e2.stun=20}})}else{for(let i2=-2;i2<=2;i2++){const a3=p.ang+i2*.18;pr.push({x:p.x,y:p.y,vx:Math.cos(a3)*11,vy:Math.sin(a3)*11,dmg:edmg*1.3,co:cd.c,l:60,ar:true})};sfx(900,.03,'square')}}
  pr=pr.filter(p2=>{p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.l--;if(p2.l<=0)return false;if(p2.ar&&f%2===0)sp(p2.x,p2.y,1,cd.c+'60',1,3);if(p2.en){if(Math.hypot(p2.x-p.x,p2.y-p.y)<ps()&&p.inv<=0&&p.dt<=0&&p.alive){hitP(p2.dmg);return false}return true}for(let i2=e.length-1;i2>=0;i2--){const e2=e[i2];if(!e2.alive)continue;if(Math.hypot(p2.x-e2.x,p2.y-e2.y)<e2.sz+5){dmgE(e2,p2.dmg);if(!e2.alive)e.splice(i2,1);return false}}return true});
  e.forEach(e2=>{if(!e2.alive)return;if(e2.stun>0){e2.stun--;return}const dx=e2.x-p.x,dy=e2.y-p.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);const sp3=e2.ai==='berserk'?e2.sp*1.3:e2.sp;e2.x+=Math.cos(ang)*sp3*dt*60;e2.y+=Math.sin(ang)*sp3*dt*60;if(e2.ai==='ranged'&&dist<320&&dist>80&&e2.shCD<=0){e2.shCD=e2.shM;pr.push({x:e2.x,y:e2.y,vx:Math.cos(ang)*5.5,vy:Math.sin(ang)*5.5,dmg:e2.dmg,co:e2.co,l:80,en:true})}if(e2.shCD>0)e2.shCD--;if(e2.ai==='shaman'&&e2.hCD>0)e2.hCD--;if(e2.ai==='shaman'&&e2.hCD<=0){e2.hCD=e2.hM;e.forEach(oe=>{if(oe!==e2&&oe.alive&&Math.hypot(oe.x-e2.x,oe.y-e2.y)<50){oe.hp=Math.min(oe.mh,oe.hp+15);sf2(oe.x,oe.y-8,'+15','#4c4')}})}if(dist<e2.sz+ps()&&p.inv<=0&&p.dt<=0&&p.alive)hitP(e2.dmg);const[enx,eny]=clampToArena(e2.x,e2.y,2);e2.x=enx;e2.y=eny});
  e=e.filter(e2=>e2.alive);if(e.length===0&&levelKilled>=levelEnemies)levelClear();
  pa=pa.filter(p2=>{p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.vx*=.84;p2.vy*=.84;p2.l--;return p2.l>0});
  ef=ef.filter(e2=>{e2.r+=(e2.mr-e2.r)*.2;e2.l--;return e2.l>0});
  ft=ft.filter(t=>{t.y+=t.vy*dt*60;t.l--;return t.l>0});
  si*=.82;sx=(Math.random()-.5)*si;sy=(Math.random()-.5)*si;camX+=(p.x-camX)*dt*6;camY+=(p.y-camY)*dt*6;
}

// ============== RENDER ==============
function D(){
  const zoom=1.15,cx=W/2-camX*zoom,cy=H/2-camY*zoom;
  const gg=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,Math.max(W,H));gg.addColorStop(0,'#2a1a10');gg.addColorStop(.5,'#120a04');gg.addColorStop(1,'#060402');ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.01)';ctx.lineWidth=.4;for(let x=50;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=50;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.save();
  // Draw polygon arena
  ctx.beginPath();arenaVerts.forEach((v,i)=>{const s={x:cx+v[0]*zoom,y:cy+v[1]*zoom};if(i===0)ctx.moveTo(s.x,s.y);else ctx.lineTo(s.x,s.y)});ctx.closePath();
  ctx.fillStyle='rgba(40,28,16,.22)';ctx.fill();ctx.strokeStyle='rgba(200,150,80,.3)';ctx.lineWidth=6;ctx.stroke();ctx.strokeStyle='rgba(200,150,80,.06)';ctx.lineWidth=18;ctx.stroke();
  function ws(x,y){return{x:cx+x*zoom,y:cy+y*zoom}}
  it.forEach(o=>{const s=ws(o.x,o.y),pulse=1+Math.sin(f*.08)*.12;ctx.fillStyle=o.type.c+'18';ctx.beginPath();ctx.arc(s.x,s.y,18*pulse,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,0,0,.7)';ctx.beginPath();ctx.arc(s.x,s.y,13,0,Math.PI*2);ctx.fill();ctx.strokeStyle=o.type.c+'45';ctx.lineWidth=2;ctx.stroke();ctx.font='17px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.type.ico,s.x,s.y)});
  ef.forEach(e2=>{const s=ws(e2.x,e2.y),a=e2.l/14*.22;ctx.strokeStyle=e2.c+Math.floor(a*255).toString(16).padStart(2,'0');ctx.lineWidth=3*a;ctx.beginPath();ctx.arc(s.x,s.y,e2.r*zoom,0,Math.PI*2);ctx.stroke()});
  pa.forEach(p2=>{const s=ws(p2.x,p2.y),a=p2.l/p2.maxL;ctx.fillStyle=p2.c+Math.floor(a*255).toString(16).padStart(2,'0');ctx.beginPath();ctx.arc(s.x,s.y,p2.size*a*zoom,0,Math.PI*2);ctx.fill()});
  pr.filter(p2=>p2.en).forEach(p2=>{const s=ws(p2.x,p2.y);ctx.fillStyle=p2.co;ctx.shadowColor=p2.co;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(s.x,s.y,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0});
  pr.filter(p2=>!p2.en).forEach(p2=>{const s=ws(p2.x,p2.y);ctx.fillStyle=p2.co;ctx.shadowColor=p2.co;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(s.x,s.y,p2.ar?2.5:4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0});
  e.forEach(e2=>{if(!e2.alive)return;const s=ws(e2.x,e2.y);ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(s.x,s.y-2,e2.sz*zoom,e2.sz*.45*zoom,0,0,Math.PI*2);ctx.fill();if(e2.state==='chase'){ctx.fillStyle=e2.co+'10';ctx.beginPath();ctx.arc(s.x,s.y,e2.sz*2.5*zoom,0,Math.PI*2);ctx.fill()}const eg=ctx.createRadialGradient(s.x-e2.sz*.2*zoom,s.y-e2.sz*.3*zoom,e2.sz*.08*zoom,s.x,s.y,e2.sz*zoom);eg.addColorStop(0,'#fff');eg.addColorStop(.35,e2.co);eg.addColorStop(1,'#0a0604');ctx.fillStyle=eg;
    if(e2.sh==='hex'){ctx.beginPath();for(let i2=0;i2<6;i2++){const a2=i2*Math.PI/3+Math.PI/6;ctx.lineTo(s.x+Math.cos(a2)*e2.sz*zoom,s.y+Math.sin(a2)*e2.sz*zoom)}ctx.closePath();ctx.fill()}else if(e2.sh==='rect')ctx.fillRect(s.x-e2.sz*.8*zoom,s.y-e2.sz*1.1*zoom,e2.sz*1.6*zoom,e2.sz*1.4*zoom);else if(e2.sh==='circ'){ctx.beginPath();ctx.arc(s.x,s.y,e2.sz*zoom,0,Math.PI*2);ctx.fill()}else if(e2.sh==='diam'){ctx.beginPath();ctx.moveTo(s.x,s.y-e2.sz*zoom);ctx.lineTo(s.x+e2.sz*.8*zoom,s.y);ctx.lineTo(s.x,s.y+e2.sz*zoom);ctx.lineTo(s.x-e2.sz*.8*zoom,s.y);ctx.closePath();ctx.fill()}else{ctx.beginPath();ctx.moveTo(s.x,s.y-e2.sz*zoom);ctx.lineTo(s.x+e2.sz*.85*zoom,s.y+e2.sz*.7*zoom);ctx.lineTo(s.x-e2.sz*.85*zoom,s.y+e2.sz*.7*zoom);ctx.closePath();ctx.fill()}
    if(e2.hp<e2.mh){const bw=e2.sz*1.8*zoom;ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(s.x-bw/2,s.y-e2.sz*zoom-12,bw,3);ctx.fillStyle=e2.co;ctx.fillRect(s.x-bw/2,s.y-e2.sz*zoom-12,bw*(e2.hp/e2.mh),3)}});
  // PLAYER - humanoid figure
  if(p&&p.alive){const s=ws(p.x,p.y),z=zoom*1.3,da=p.ang;
    if(p.inv>0&&Math.floor(p.inv/4)%2===0)ctx.globalAlpha=.25;
    // Ground shadow
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.ellipse(s.x,s.y+8*z,10*z,4*z,0,0,Math.PI*2);ctx.fill();
    // Glow circle
    const g=ctx.createRadialGradient(s.x,s.y-2*z,4*z,s.x,s.y-2*z,16*z);g.addColorStop(0,cd.c+'40');g.addColorStop(.6,cd.c+'08');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y-2*z,16*z,0,Math.PI*2);ctx.fill();
    if(p.shT>0){ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(s.x,s.y,15*z,0,Math.PI*2);ctx.stroke()}
    if(p.stealth){ctx.fillStyle='rgba(80,200,80,.08)';ctx.beginPath();ctx.arc(s.x,s.y,ps()*zoom,0,Math.PI*2);ctx.fill()}

    // Humanoid body
    const hc=cd.c,sk='#e8d0b8'; // skin tone
    // Legs (two lines behind body)
    ctx.strokeStyle=ck==='warrior'?'#5a4030':'#4a7060';ctx.lineWidth=4*z;ctx.lineCap='round';
    const legSpread=.4;ctx.beginPath();ctx.moveTo(s.x-Math.cos(da)*4*z+Math.cos(da+Math.PI/2)*3*z*legSpread,s.y-Math.sin(da)*4*z+Math.sin(da+Math.PI/2)*3*z*legSpread);ctx.lineTo(s.x+Math.cos(da)*8*z+Math.cos(da+Math.PI/2)*3*z*legSpread,s.y+Math.sin(da)*8*z+Math.sin(da+Math.PI/2)*3*z*legSpread);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s.x-Math.cos(da)*4*z-Math.cos(da+Math.PI/2)*3*z*legSpread,s.y-Math.sin(da)*4*z-Math.sin(da+Math.PI/2)*3*z*legSpread);ctx.lineTo(s.x+Math.cos(da)*8*z-Math.cos(da+Math.PI/2)*3*z*legSpread,s.y+Math.sin(da)*8*z-Math.sin(da+Math.PI/2)*3*z*legSpread);ctx.stroke();

    // Body (torso)
    ctx.fillStyle=ck==='warrior'?'#6a4a38':'#4a6858';ctx.beginPath();ctx.ellipse(s.x,s.y-5*z,5*z,7*z,da,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();

    // Head
    ctx.fillStyle=sk;ctx.beginPath();ctx.arc(s.x+Math.cos(da)*2*z,s.y-14*z,4.5*z,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
    // Helmet
    ctx.fillStyle=ck==='warrior'?'#7a5a42':'#5a8070';ctx.beginPath();ctx.arc(s.x+Math.cos(da)*2*z,s.y-15.5*z,4.5*z,Math.PI,0);ctx.fill();
    // Eyes (direction indicator)
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x+Math.cos(da)*5*z,s.y-14*z,1.5*z,0,Math.PI*2);ctx.fill();

    // Arms & weapon
    const ra=da+(p.at>0?-1.5:(ck==='warrior'?-.5:-.8)); // swing during attack
    ctx.strokeStyle=sk;ctx.lineWidth=2.5*z;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x+Math.cos(da)*2*z,s.y-7*z);ctx.lineTo(s.x+Math.cos(ra)*10*z,s.y+Math.sin(ra)*10*z-7*z);ctx.stroke();

    if(ck==='warrior'){
      // Sword in hand
      const tipX=s.x+Math.cos(ra)*16*z,tipY=s.y+Math.sin(ra)*16*z-7*z;
      ctx.strokeStyle='#e8e0d0';ctx.lineWidth=3*z;ctx.shadowColor='#fff';ctx.shadowBlur=3;
      ctx.beginPath();ctx.moveTo(s.x+Math.cos(ra)*10*z,s.y+Math.sin(ra)*10*z-7*z);ctx.lineTo(tipX,tipY);ctx.stroke();ctx.shadowBlur=0;
      // Sword tip glow
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(tipX,tipY,2*z,0,Math.PI*2);ctx.fill();
      // Shield on off-hand
      ctx.fillStyle='#8a6a50';ctx.beginPath();ctx.arc(s.x-Math.cos(da-.8)*9*z,s.y-Math.sin(da-.8)*9*z-5*z,5*z,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
    }else{
      // Bow
      ctx.strokeStyle='#c8b898';ctx.lineWidth=2*z;ctx.beginPath();ctx.arc(s.x+Math.cos(da-.6)*11*z,s.y+Math.sin(da-.6)*11*z-6*z,7*z,-da-.7,-da+.7);ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(s.x+Math.cos(da-1.3)*10*z,s.y+Math.sin(da-1.3)*10*z-6*z);ctx.lineTo(s.x+Math.cos(da+.2)*12*z,s.y+Math.sin(da+.2)*12*z-6*z);ctx.stroke();
    }
    ctx.globalAlpha=1}
  ft.forEach(t=>{const s=ws(t.x,t.y),a=t.l/35;ctx.fillStyle=t.c+Math.floor(a*255).toString(16).padStart(2,'0');ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.fillText(t.t,s.x,s.y)});
  ctx.restore();
  const v2=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.3,W/2,H/2,Math.max(W,H)*.8);v2.addColorStop(0,'transparent');v2.addColorStop(1,'rgba(0,0,0,.48)');ctx.fillStyle=v2;ctx.fillRect(0,0,W,H);
}

function HUD(){if(!run)return;
  // HP bar
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(14,14,208,14);ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(16,16,204,10);const hp2=Math.max(0,p.hp/p.mh);ctx.fillStyle=hp2>.5?'#c44':hp2>.25?'#e84':'#e44';ctx.fillRect(16,16,204*hp2,10);
  ctx.fillStyle='#c8b898';ctx.font='600 11px Inter';ctx.textAlign='left';ctx.fillText(cd.n,18,12);ctx.fillText(Math.ceil(p.hp)+'/'+p.mh,18,38);
  // Kill/Wave
  ctx.fillStyle='#c8a050';ctx.font='bold 22px Inter';ctx.textAlign='right';ctx.fillText('关卡 '+clevel,W-18,30);ctx.fillStyle='rgba(200,180,150,.4)';ctx.font='10px Inter';ctx.fillText(arenaName,W-18,44);ctx.fillStyle='rgba(200,180,150,.6)';ctx.font='12px Inter';ctx.fillText(levelKilled+'/'+levelEnemies+' 击杀',W-18,60);
  // Buffs
  let by=58;if(p.sb>0){ctx.fillStyle='#4af';ctx.textAlign='left';ctx.font='11px Inter';ctx.fillText('💨 加速 '+(p.sb/60).toFixed(0)+'s',18,by);by+=18}if(p.db>0){ctx.fillStyle='#fa0';ctx.fillText('💪 增伤 '+(p.db/60).toFixed(0)+'s',18,by);by+=18}if(p.shT>0){ctx.fillStyle='#fff';ctx.fillText('🛡️ 护盾 '+(p.shT/60).toFixed(0)+'s',18,by);by+=18}
  // Backpack
  const bY=H-120,bX=W/2-(backpackMax*30)/2;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bX-4,bY-4,backpackMax*30+4,32);
  for(let i=0;i<backpackMax;i++){
    ctx.fillStyle=i<backpack.length?'rgba(255,255,255,.08)':'rgba(255,255,255,.02)';ctx.fillRect(bX+i*30,bY,28,28);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.strokeRect(bX+i*30,bY,28,28);
    if(i<backpack.length){ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(backpack[i].ico,bX+i*30+14,bY+20)}
    ctx.fillStyle='rgba(200,180,150,.3)';ctx.font='9px Inter';ctx.fillText(i+1,bX+i*30+6,bY+10);
  }
  ctx.textAlign='center';ctx.fillStyle='rgba(200,180,150,.3)';ctx.font='9px Inter';ctx.fillText('背包 按1/2/3使用',W/2,bY-8);
}

// ============== MAIN LOOP ==============
let lt=performance.now();
function loop(){const now=performance.now(),dt=(now-lt)/1000;lt=now;U(dt);ctx.save();ctx.translate(sx,sy);D();ctx.restore();HUD();requestAnimationFrame(loop)}
loop();

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>深夜食堂 · Midnight Grill 3D</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0618">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Inter","PingFang SC",sans-serif;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
canvas{display:block}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:#0a0618;color:#c8a050;font-size:20px;transition:opacity .5s;flex-direction:column;gap:18px}
#loading.done{opacity:0;pointer-events:none}
#loading-bar{width:200px;height:3px;background:rgba(200,160,80,.2);border-radius:2px;overflow:hidden}
#loading-bar-fill{height:100%;background:#c8a050;width:0;transition:width .3s}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#ui>*{pointer-events:auto}
#hud{position:absolute;top:0;left:0;right:0;padding:14px 20px;background:linear-gradient(180deg,rgba(10,6,24,.95),transparent);display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:700;font-size:16px}
#money{color:#ffd700;transition:transform .15s}
#money.pop{transform:scale(1.3)}
#day{color:#c8a050}
#combo{color:#ff8800;font-size:20px;transition:all .2s;opacity:0}
#combo.show{opacity:1;animation:comboIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes comboIn{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
#orders{position:absolute;top:65px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
.order-card{background:rgba(10,6,24,.9);padding:10px 14px;border-radius:10px;color:#fff;font-size:13px;text-align:center;border:1px solid rgba(200,160,80,.2);backdrop-filter:blur(8px);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);min-width:90px}
.order-card.urgent{border-color:#ff4444;box-shadow:0 0 12px rgba(255,68,68,.3);animation:urgentPulse .5s infinite alternate}
@keyframes cardIn{0%{transform:translateX(60px) scale(.8);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}
@keyframes urgentPulse{0%{border-color:#ff4444;box-shadow:0 0 8px rgba(255,68,68,.2)}100%{border-color:#ff6666;box-shadow:0 0 16px rgba(255,68,68,.5)}}
.order-card .timer-bar{height:3px;background:rgba(255,255,255,.1);margin-top:6px;border-radius:2px;overflow:hidden}
.order-card .timer-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
#bottomUI{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#bottomUI button{padding:14px 22px;border-radius:24px;border:2px solid rgba(200,160,80,.25);background:rgba(10,6,24,.85);color:#e8d8c0;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);letter-spacing:.03em}
#bottomUI button:hover{background:rgba(200,160,80,.15);border-color:#c8a050;transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,160,80,.2)}
#bottomUI button:active{transform:scale(.93);transition:transform .05s}
#bottomUI button.sel{border-color:#ffaa00;background:rgba(255,170,0,.2);box-shadow:0 0 24px rgba(255,170,0,.35);color:#ffaa00;animation:selPulse .8s infinite alternate}
@keyframes selPulse{0%{box-shadow:0 0 16px rgba(255,170,0,.25)}100%{box-shadow:0 0 32px rgba(255,170,0,.5)}}
#msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;color:#ffaa00;pointer-events:none;text-shadow:0 0 30px rgba(255,170,0,.6);opacity:0;transition:opacity .3s;text-align:center;line-height:1.6}
#msg.show{opacity:1}
.floating{position:fixed;pointer-events:none;font-weight:900;font-size:18px;z-index:20;animation:floatUp .8s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
</style>
</head>
<body>
<div id="loading">
  🔥 深夜食堂 · Midnight Grill 3D
  <div id="loading-bar"><div id="loading-bar-fill"></div></div>
</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud"><span id="money">💰 $0</span><span id="day">Day 1</span><span id="combo"></span></div>
  <div id="orders"></div>
  <div id="bottomUI"></div>
  <div id="msg"></div>
</div>

<script src="three.min.js"></script>
<script>
// ====== CHECK THREE.JS LOADED ======
if (typeof THREE === 'undefined') {
  document.getElementById('loading').innerHTML = '⚠️ 3D 引擎加载失败，请刷新页面重试';
  throw new Error('Three.js not loaded');
}
// ====== SETUP ======
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:false});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.3;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#0a0618');
scene.fog=new THREE.Fog('#0a0618',10,35);

const camera=new THREE.PerspectiveCamera(50,W/H,0.5,50);
camera.position.set(0,7.5,11);
camera.lookAt(0,1.5,0);

// ====== LIGHTING ======
const ambient=new THREE.AmbientLight('#2a1830',1.2);scene.add(ambient);
const moonLight=new THREE.DirectionalLight('#8899cc',1.5);moonLight.position.set(-3,8,-2);moonLight.castShadow=true;moonLight.shadow.mapSize.set(1024,1024);moonLight.shadow.camera.near=0.5;moonLight.shadow.camera.far=30;moonLight.shadow.camera.left=-12;moonLight.shadow.camera.right=12;moonLight.shadow.camera.top=12;moonLight.shadow.camera.bottom=-12;moonLight.shadow.bias=-.0003;scene.add(moonLight);

// Warm kitchen light from above
const kitchenLight=new THREE.PointLight('#ffc080',15,8,2);kitchenLight.position.set(0,4,2);kitchenLight.castShadow=true;kitchenLight.shadow.mapSize.set(512,512);kitchenLight.shadow.bias=-.0005;scene.add(kitchenLight);

// Neon sign glow (behind camera, reflecting on scene)
const neonLight=new THREE.PointLight('#ff4422',5,6,1.5);neonLight.position.set(0,3,-8);scene.add(neonLight);

// ====== AUDIO ======
let ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.025){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.25,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

// ====== 3D KITCHEN ======
// Floor tiles
const floorGeo=new THREE.PlaneGeometry(14,10);
const floorMat=new THREE.MeshStandardMaterial({color:'#1a1008',roughness:.95});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// Tatami-style grid lines on floor
const gridHelper=new THREE.PolarGridHelper(6,32,24,64,'#2a1a10','#2a1a10');gridHelper.position.y=.005;scene.add(gridHelper);

// Back wall with wooden panels
const wallGeo=new THREE.PlaneGeometry(14,5);
const wallMat=new THREE.MeshStandardMaterial({color:'#1a0e08',roughness:.9});
const wall=new THREE.Mesh(wallGeo,wallMat);
wall.position.set(0,2.5,-5);wall.receiveShadow=true;scene.add(wall);

// Wooden slats on wall
for(let i=0;i<5;i++){
  const slatGeo=new THREE.BoxGeometry(13,.06,.04);
  const slat=new THREE.Mesh(slatGeo,new THREE.MeshStandardMaterial({color:'#3a2010',roughness:.5}));
  slat.position.set(0,1+i*.8,-4.98);slat.receiveShadow=true;scene.add(slat);
}

// Neon sign "深夜食堂"
const signGroup=new THREE.Group();
const signGeo=new THREE.PlaneGeometry(3.5,.6);
const signCanvas=document.createElement('canvas');signCanvas.width=512;signCanvas.height=88;
const sctx=signCanvas.getContext('2d');
sctx.fillStyle='#0a0618';sctx.fillRect(0,0,512,88);
sctx.font='bold 52px "PingFang SC","Noto Serif SC",serif';sctx.fillStyle='#ff4422';sctx.textAlign='center';sctx.fillText('深夜食堂',256,60);
const signTex=new THREE.CanvasTexture(signCanvas);signTex.minFilter=THREE.LinearFilter;
const signMat=new THREE.MeshBasicMaterial({map:signTex,transparent:true,emissive:'#ff4422',emissiveIntensity:.5});
const signMesh=new THREE.Mesh(signGeo,signMat);
signMesh.position.set(0,4.5,-4.96);signGroup.add(signMesh);
scene.add(signGroup);

// Lanterns
function createLantern(x,y,z){
  const g=new THREE.Group();
  const bodyGeo=new THREE.CylinderGeometry(.15,.2,.35,16);
  const body=new THREE.Mesh(bodyGeo,new THREE.MeshStandardMaterial({color:'#cc2200',roughness:.3,emissive:'#ff4400',emissiveIntensity:.8}));
  body.position.y=.18;g.add(body);
  const glowGeo=new THREE.SphereGeometry(.25,16,16);
  const glow=new THREE.Mesh(glowGeo,new THREE.MeshBasicMaterial({color:'#ff6600',transparent:true,opacity:.15}));
  glow.position.y=.18;g.add(glow);
  g.position.set(x,y,z);scene.add(g);
}
createLantern(-4,4.5,-4.9);createLantern(4,4.5,-4.9);createLantern(0,4.5,-4.9);

// Main counter
const counterGeo=new THREE.BoxGeometry(9,.25,4.5);
const counterMat=new THREE.MeshStandardMaterial({color:'#3a2010',roughness:.55,metalness:.1});
const counter=new THREE.Mesh(counterGeo,counterMat);
counter.position.y=1.15;counter.castShadow=true;counter.receiveShadow=true;scene.add(counter);

const topGeo=new THREE.BoxGeometry(9,.06,4.5);
const topMat=new THREE.MeshStandardMaterial({color:'#5a3820',roughness:.35,metalness:.15});
const top=new THREE.Mesh(topGeo,topMat);
top.position.y=1.3;top.receiveShadow=true;scene.add(top);

// ====== PARTICLE SYSTEM ======
const particles=[];
function spawnParticles(position,color,count=12,speed=2,life=.8,size=.06){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(size*(.5+Math.random()),4,4);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.9});
    const p=new THREE.Mesh(geo,mat);
    p.position.copy(position);
    p.position.x+=(Math.random()-.5)*.4;
    p.position.z+=(Math.random()-.5)*.4;
    p.userData={
      vel:new THREE.Vector3((Math.random()-.5)*speed,Math.random()*speed*1.5,(Math.random()-.5)*speed),
      life,age:0
    };
    scene.add(p);particles.push(p);
  }
}

function spawnSteam(position,count=6){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(.1*(.5+Math.random()),6,6);
    const mat=new THREE.MeshBasicMaterial({color:'#ffffff',transparent:true,opacity:.15});
    const p=new THREE.Mesh(geo,mat);
    p.position.copy(position);
    p.position.x+=(Math.random()-.5)*.3;
    p.position.z+=(Math.random()-.5)*.3;
    p.userData={vel:new THREE.Vector3((Math.random()-.5)*.3,1+Math.random()*1.5,(Math.random()-.5)*.3),life:1.5+.5*Math.random(),age:0,steam:true};
    scene.add(p);particles.push(p);
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.userData.age+=dt;
    if(p.userData.age>p.userData.life){scene.remove(p);if(p.material)p.material.dispose();if(p.geometry)p.geometry.dispose();particles.splice(i,1);continue}
    const prog=p.userData.age/p.userData.life;
    p.position.x+=p.userData.vel.x*dt;
    p.position.y+=p.userData.vel.y*dt;
    p.position.z+=p.userData.vel.z*dt;
    if(p.userData.steam){
      p.scale.setScalar(1+prog*3);
      p.material.opacity=.15*(1-prog);
    }else{
      p.material.opacity=.9*(1-prog);
    }
  }
}

// ====== FLOATING TEXT (DOM) ======
function showFloating(text,color='#ffd700'){
  const el=document.createElement('div');
  el.className='floating';el.textContent=text;el.style.color=color;
  el.style.left=(W/2+(Math.random()-.5)*80)+'px';
  el.style.top=(H*.35+Math.random()*40)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// ====== COOKING STATIONS ======
const stations=[];
function createStation(x,z,name,color,dishIcon){
  const group=new THREE.Group();

  // Base
  const baseGeo=new THREE.CylinderGeometry(.55,.6,.06,32);
  const base=new THREE.Mesh(baseGeo,new THREE.MeshStandardMaterial({color:'#2a2a2a',roughness:.3,metalness:.7}));
  base.position.y=1.32;group.add(base);

  // Surface
  const surfGeo=new THREE.CylinderGeometry(.5,.5,.04,32);
  const surf=new THREE.Mesh(surfGeo,new THREE.MeshStandardMaterial({color,roughness:.25,metalness:.3}));
  surf.position.y=1.37;group.add(surf);

  // Glow ring
  const ringGeo=new THREE.TorusGeometry(.48,.025,8,32);
  const ring=new THREE.Mesh(ringGeo,new THREE.MeshStandardMaterial({color,roughness:.1,metalness:.9,emissive:color,emissiveIntensity:.4}));
  ring.rotation.x=Math.PI/2;ring.position.y=1.4;group.add(ring);

  // Progress indicator (cylinder that grows)
  const progGeo=new THREE.CylinderGeometry(.02,.02,.01,8);
  const prog=new THREE.Mesh(progGeo,new THREE.MeshBasicMaterial({color:'#ffaa00',transparent:true,opacity:0}));
  prog.position.y=1.42;group.add(prog);

  // Done indicator
  const doneGeo=new THREE.RingGeometry(.4,.45,32);
  const done=new THREE.Mesh(doneGeo,new THREE.MeshBasicMaterial({color:'#ffdd00',transparent:true,opacity:0,side:THREE.DoubleSide}));
  done.rotation.x=-Math.PI/2;done.position.y=1.43;group.add(done);

  group.position.set(x,0,z);
  group.castShadow=true;group.receiveShadow=true;
  group.userData={name,color,icon:dishIcon,action:name.includes('Grill')?'grill':name.includes('Fry')?'fryer':'prep',timer:0,maxT:0,item:null,state:'idle',ring,prog,done};
  scene.add(group);
  stations.push(group);
  return group;
}

const grillSt=createStation(-2.5,-1,'Grill','#ff4422','🥩');
const fryerSt=createStation(2.5,-1,'Fryer','#ffaa22','🍗');
const prepSt=createStation(0,0,'Prep','#888888','🔪');
const serveSt=createStation(0,1.5,'Serve','#ffffff','🍽️');

// ====== FOOD ITEMS ======
const foodItems=[];
function createFood(icon,color,size){
  const group=new THREE.Group();
  const bodyGeo=new THREE.SphereGeometry(size,.4+Math.random()*.3,10,8);
  bodyGeo.scale(1,.55,1);
  const body=new THREE.Mesh(bodyGeo,new THREE.MeshStandardMaterial({color,roughness:.4,metalness:.1}));
  body.position.y=1.45;group.add(body);
  // Highlight ring
  const hlGeo=new THREE.TorusGeometry(size*1.3,.015,8,16);
  const hl=new THREE.Mesh(hlGeo,new THREE.MeshBasicMaterial({color:'#ffffff',transparent:true,opacity:0}));
  hl.rotation.x=Math.PI/2;hl.position.y=1.45;group.add(hl);
  group.visible=false;group.userData={icon,color,raw:true,highlight:hl};
  scene.add(group);foodItems.push(group);
  return group;
}
const foodDefs=[
  {ico:'🥩',c:'#cc3322',s:.14},{ico:'🍗',c:'#dd9944',s:.13},
  {ico:'🐟',c:'#ee9977',s:.13},{ico:'🥔',c:'#ccaa44',s:.12},
  {ico:'🍚',c:'#eeeedd',s:.11},{ico:'🥬',c:'#44aa44',s:.11}
];
foodDefs.forEach(f=>createFood(f.ico,f.c,f.s));

// ====== RAYCASTER ======
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selectedFood=null;

function onPointer(e){mouse.x=(e.clientX/W)*2-1;mouse.y=-(e.clientY/H)*2+1}
window.addEventListener('pointermove',onPointer);
window.addEventListener('pointerdown',(e)=>{
  onPointer(e);ia();
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(stations,true);
  if(hits.length>0){
    let st=hits[0].object;
    while(st&&!st.userData.name)st=st.parent;
    if(st&&st.userData.name)handleStationClick(st.userData,st);
  }
});

// ====== GAME LOGIC ======
let money=0,day=1,combo=0,ctimer=0;
let orders=[],ordTimer=0,servedToday=0;

const allRecipes=[
  {n:'烤牛肉',ico:'🥩',ing:[0],time:180,price:12},
  {n:'炸鸡',ico:'🍗',ing:[1],time:200,price:15},
  {n:'烤鱼',ico:'🐟',ing:[2],time:190,price:14},
  {n:'烤土豆',ico:'🥔',ing:[3],time:160,price:10},
  {n:'米饭',ico:'🍚',ing:[4],time:140,price:8},
  {n:'沙拉',ico:'🥬',ing:[5],time:120,price:9},
];

function addOrder(){
  const available=allRecipes.filter(r=>r.price<=money+20||r.price<=15);
  const r=available[Math.floor(Math.random()*available.length)]||allRecipes[0];
  orders.push({...r,timer:r.time,served:false});
  updateOrdersUI();
}

function completeOrder(idx){
  const o=orders[idx];if(!o||o.served)return;
  const bonus=o.timer/o.time>.6?Math.floor(o.price*.5):0;
  money+=o.price+bonus;servedToday++;combo++;ctimer=85;

  o.served=true;orders.splice(idx,1);
  sfx(1400,.04,'sine',.02);setTimeout(()=>sfx(2000,.05,'sine',.02),60);

  // Particles
  const pos=new THREE.Vector3(0,2.5,0);
  spawnParticles(pos,'#ffd700',8,3,.8,.08);
  if(bonus>0)showFloating('+$'+(o.price+bonus)+' ⚡BONUS','#ffd700');
  else showFloating('+$'+o.price,'#ffd700');
  if(combo>=5)showFloating(combo+'x COMBO!','#ff8800');

  // Money pop
  const moneyEl=document.getElementById('money');
  moneyEl.classList.add('pop');setTimeout(()=>moneyEl.classList.remove('pop'),150);

  updateOrdersUI();updateHUD();
  setTimeout(()=>{if(orders.length<3)addOrder()},500);

  if(servedToday>=5+day*2){
    day++;servedToday=0;
    sfx(300,.07,'sine',.04);setTimeout(()=>sfx(600,.08,'sine',.04),60);
    showFloating('🌙 Day '+day+'!','#c8a050');
    updateHUD();
  }
}

function updateHUD(){
  document.getElementById('money').textContent='💰 $'+money;
  document.getElementById('day').textContent='Day '+day;
  const comboEl=document.getElementById('combo');
  if(combo>=3){comboEl.textContent=combo+'x COMBO!';comboEl.classList.add('show')}
  else{comboEl.classList.remove('show')}
}

function updateOrdersUI(){
  const el=document.getElementById('orders');
  el.innerHTML=orders.map((o,i)=>{
    const pct=o.timer/o.time;
    const urgent=pct<.3;
    const fillColor=pct>.6?'#5c5':pct>.3?'#f80':'#f44';
    return`<div class="order-card${urgent?' urgent':''}" style="animation-delay:${i*.06}s">
      <div>${o.ico} ${o.n}</div>
      <div style="color:#c8a050;font-weight:700">$${o.price}</div>
      <div class="timer-bar"><div class="timer-fill" style="width:${pct*100}%;background:${fillColor}"></div></div>
    </div>`;
  }).join('');
}

function handleStationClick(data,obj){
  if(data.state==='idle'&&selectedFood){
    data.item=selectedFood.userData;
    data.state='cooking';
    data.timer=data.action==='grill'?180:data.action==='fryer'?200:100;
    data.maxT=data.timer;
    selectedFood.visible=false;selectedFood=null;
    sfx(200,.12,'sawtooth',.015);

    // Ring turns orange
    data.ring.material.emissive.set('#ff8800');data.ring.material.emissiveIntensity=1.2;
    data.prog.material.opacity=.6;
    // Steam particles
    const worldPos=new THREE.Vector3();obj.getWorldPosition(worldPos);
    worldPos.y+=.6;
    spawnSteam(worldPos,5);

    document.querySelectorAll('#bottomUI button').forEach(x=>x.classList.remove('sel'));
    showMsg('');
  }else if(data.state==='done'&&data.item){
    const found=orders.findIndex(o=>!o.served&&data.item.icon===o.ico);
    if(found>=0){
      completeOrder(found);
      // Done burst
      const worldPos=new THREE.Vector3();obj.getWorldPosition(worldPos);
      worldPos.y+=.8;
      spawnParticles(worldPos,'#ffdd00',15,3,.7,.06);
      spawnParticles(worldPos,'#ffffff',8,2,.5,.04);
      data.item=null;data.state='idle';data.timer=0;
      data.ring.material.emissive.set(data.color);data.ring.material.emissiveIntensity=.4;
      data.prog.material.opacity=0;
      data.done.material.opacity=0;
      sfx(600,.08,'triangle',.03);
    }
  }
}

function showMsg(t){const el=document.getElementById('msg');el.textContent=t;if(t){el.classList.add('show')}else{el.classList.remove('show')}}

// ====== INGREDIENT BUTTONS ======
const btnEl=document.getElementById('bottomUI');
foodDefs.forEach((f,i)=>{
  const b=document.createElement('button');b.textContent=f.ico+' '+['Beef','Chicken','Fish','Potato','Rice','Veg'][i];
  b.addEventListener('click',()=>{
    ia();sfx(800,.03,'sine',.015);
    if(selectedFood){selectedFood.visible=false;selectedFood.userData.highlight.material.opacity=0}
    document.querySelectorAll('#bottomUI button').forEach(x=>x.classList.remove('sel'));
    selectedFood=foodItems[i];
    selectedFood.visible=true;
    selectedFood.position.set(0,1.65,0);
    selectedFood.userData.highlight.material.opacity=.8;
    b.classList.add('sel');
    showMsg('已选 '+f.ico+' → 点击厨房设备放入');
    setTimeout(()=>showMsg(''),2000);
  });
  btnEl.appendChild(b);
});

// ====== GAME LOOP ======
const clock=new THREE.Clock();
function loop(){
  const dt=Math.min(clock.getDelta(),.15);

  // Combo timer
  if(ctimer>0){ctimer-=dt*60;if(ctimer<=0)combo=0}

  // Station timers + visual updates
  stations.forEach(st=>{
    const d=st.userData;
    if(d.timer>0){
      d.timer-=dt*60;
      const prog=1-d.timer/d.maxT;
      d.prog.scale.y=prog*1.2;d.prog.material.opacity=.3+prog*.5;

      // Continuous steam while cooking
      if(Math.random()<dt*4){
        const wp=new THREE.Vector3();st.getWorldPosition(wp);wp.y+=.5;
        spawnSteam(wp,2);
      }

      if(d.timer<=0){
        d.state='done';d.timer=0;
        d.prog.material.opacity=0;d.prog.scale.y=.01;
        d.ring.material.emissive.set('#ffdd00');d.ring.material.emissiveIntensity=1.8;
        d.done.material.opacity=.5;
        // Done burst
        const wp=new THREE.Vector3();st.getWorldPosition(wp);wp.y+=.7;
        spawnParticles(wp,'#ffaa00',10,2,.6,.05);
        sfx(1000,.06,'triangle',.025);setTimeout(()=>sfx(1400,.05,'triangle',.02),70);
      }
    }
  });

  // Order spawning + timers
  ordTimer+=dt*60;
  if(ordTimer>Math.max(120,250-day*10)&&orders.length<3){addOrder();ordTimer=0}
  orders.forEach(o=>{if(!o.served){o.timer-=dt*60;if(o.timer<=0){o.served=true;orders=orders.filter(x=>!x.served);combo=0;ctimer=0;updateOrdersUI();updateHUD();showFloating('❌ 超时!','#ff4444');spawnParticles(new THREE.Vector3(0,2,.5),'#ff4444',6,1,.5,.08);sfx(80,.25,'sawtooth',.02)}}});

  // Update particles
  updateParticles(dt);

  // Move selected food under cursor
  if(selectedFood){
    raycaster.setFromCamera(mouse,camera);
    const plane=new THREE.Plane(new THREE.Vector3(0,1,0),-1.45);
    const pt=new THREE.Vector3();raycaster.ray.intersectPlane(plane,pt);
    if(pt){selectedFood.position.lerp(new THREE.Vector3(pt.x,1.65,pt.z),dt*12)}
  }

  updateOrdersUI();updateHUD();
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// ====== START ======
try {
  // Animate loading bar
  const fill=document.getElementById('loading-bar-fill');
  let p=0;
  const iv=setInterval(()=>{
    p=Math.min(100,p+8+Math.random()*15);
    fill.style.width=p+'%';
    if(p>=100){clearInterval(iv);
      setTimeout(()=>document.getElementById('loading').classList.add('done'),300);
    }
  },80);

  addOrder();addOrder();
  updateHUD();loop();
} catch(e) {
  document.getElementById('loading').innerHTML = '⚠️ 错误: ' + e.message + '<br><small>请刷新重试</small>';
  document.getElementById('loading').style.color = '#ff4444';
}

// Resize
window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
});
</script>
</body>

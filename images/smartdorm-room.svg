<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#ede6d8"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c8b4"/>
      <stop offset="100%" stop-color="#c4b8a4"/>
    </linearGradient>
    <linearGradient id="deskTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a87c"/>
      <stop offset="40%" stop-color="#b8956e"/>
      <stop offset="100%" stop-color="#a08060"/>
    </linearGradient>
    <linearGradient id="bedFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888078"/>
      <stop offset="100%" stop-color="#605850"/>
    </linearGradient>
    <linearGradient id="mattress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece4"/>
      <stop offset="100%" stop-color="#e0d8cc"/>
    </linearGradient>
    <linearGradient id="sunlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,248,220,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,248,220,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="boxPlastic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ece8e0"/>
      <stop offset="100%" stop-color="#d4cfc4"/>
    </linearGradient>
    <linearGradient id="rackMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8d2c8"/>
      <stop offset="50%" stop-color="#c4bdb2"/>
      <stop offset="100%" stop-color="#a89e92"/>
    </linearGradient>
  </defs>

  <!-- Background: wall -->
  <rect x="0" y="0" width="800" height="340" fill="url(#wall)"/>
  <!-- Floor -->
  <rect x="0" y="340" width="800" height="180" fill="url(#floor)"/>
  <!-- Baseboard -->
  <rect x="0" y="334" width="800" height="8" fill="#d0c4b0"/>

  <!-- Sunlight from window -->
  <polygon points="160,0 500,340 700,340 300,0" fill="url(#sunlight)" opacity="0.4"/>

  <!-- Window -->
  <rect x="180" y="40" width="160" height="200" fill="#e8f0f8" stroke="#d0c8b4" stroke-width="6" rx="2"/>
  <rect x="183" y="43" width="154" height="194" fill="#d0e4f4"/>
  <!-- Window cross bars -->
  <line x1="260" y1="46" x2="260" y2="234" stroke="#d0c8b4" stroke-width="4"/>
  <line x1="186" y1="138" x2="334" y2="138" stroke="#d0c8b4" stroke-width="4"/>
  <!-- Outside hint: trees -->
  <circle cx="230" cy="80" r="18" fill="#b0c8a0" opacity="0.5"/>
  <circle cx="290" cy="100" r="22" fill="#a8c898" opacity="0.4"/>
  <rect x="225" y="170" width="14" height="40" fill="#c0a880" opacity="0.3"/>

  <!-- Curtain hint -->
  <rect x="165" y="30" width="20" height="220" fill="rgba(220,210,190,0.4)"/>

  <!-- ============================================ -->
  <!-- BED (right side, top bunk above desk) -->
  <!-- ============================================ -->

  <!-- Bed support poles -->
  <rect x="580" y="54" width="8" height="280" fill="url(#bedFrame)"/>
  <rect x="780" y="54" width="8" height="280" fill="url(#bedFrame)"/>

  <!-- Bed frame horizontal -->
  <rect x="576" y="54" width="216" height="8" fill="url(#bedFrame)"/>

  <!-- Mattress (foreshortened, viewed from below/side) -->
  <rect x="582" y="62" width="204" height="40" rx="3" fill="url(#mattress)" stroke="#d0c8b8" stroke-width="0.5"/>
  <!-- Mattress height lines -->
  <rect x="582" y="62" width="204" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Pillow -->
  <rect x="590" y="68" width="60" height="28" rx="8" fill="#f5f0e8" stroke="#e0d8c8" stroke-width="0.5"/>

  <!-- Blanket -->
  <rect x="654" y="70" width="125" height="28" rx="6" fill="#d0d8d4" stroke="#c0c8c4" stroke-width="0.5" opacity="0.7"/>

  <!-- Ladder -->
  <rect x="565" y="90" width="14" height="250" rx="2" fill="#c8c0b4" opacity="0.5"/>
  <line x1="568" y1="130" x2="580" y2="130" stroke="#c8c0b4" stroke-width="3"/>
  <line x1="568" y1="170" x2="580" y2="170" stroke="#c8c0b4" stroke-width="3"/>
  <line x1="568" y1="210" x2="580" y2="210" stroke="#c8c0b4" stroke-width="3"/>
  <line x1="568" y1="250" x2="580" y2="250" stroke="#c8c0b4" stroke-width="3"/>

  <!-- ============================================ -->
  <!-- C MODULE - Bedside Rack (attached to bed rail) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Rack tray attached to bed rail -->
    <rect x="550" y="200" width="80" height="14" rx="2" fill="url(#rackMetal)"/>
    <rect x="554" y="214" width="72" height="42" rx="3" fill="url(#boxPlastic)" stroke="#c4bcac" stroke-width="0.5"/>

    <!-- Phone slot with phone -->
    <rect x="562" y="224" width="14" height="25" rx="2" fill="#d8d0c0"/>
    <rect x="563" y="228" width="12" height="18" rx="1" fill="#2a2a3a"/>
    <rect x="564" y="231" width="10" height="12" rx="0.5" fill="#1a1a4e"/>

    <!-- Cable holes -->
    <circle cx="588" cy="232" r="3" fill="#c0b4a4"/>
    <circle cx="598" cy="232" r="3" fill="#c0b4a4"/>

    <!-- Cup holder -->
    <circle cx="615" cy="240" r="10" fill="none" stroke="#d4ccc0" stroke-width="0.8" stroke-dasharray="3,2"/>

    <!-- Rack label -->
    <text x="590" y="272" text-anchor="middle" font-size="8" fill="#999" font-family="Inter,sans-serif">C 挂架</text>
  </g>

  <!-- ============================================ -->
  <!-- DESK (left side, under the bed area) -->
  <!-- ============================================ -->

  <!-- Desk surface -->
  <rect x="30" y="280" width="340" height="18" rx="2" fill="url(#deskTop)" stroke="#a08060" stroke-width="0.5"/>
  <!-- Desk legs -->
  <rect x="46" y="298" width="10" height="60" fill="url(#bedFrame)"/>
  <rect x="344" y="298" width="10" height="60" fill="url(#bedFrame)"/>

  <!-- Desk items -->
  <!-- Laptop -->
  <rect x="50" y="255" width="80" height="26" rx="2" fill="#c8c4bc"/>
  <rect x="52" y="256" width="76" height="22" rx="1" fill="#2a2a3a"/>

  <!-- Book -->
  <rect x="150" y="240" width="60" height="40" rx="2" fill="#d8d0c0"/>
  <rect x="152" y="241" width="56" height="36" rx="1" fill="#e8e4d8"/>
  <text x="180" y="265" text-anchor="middle" font-size="8" fill="#999" font-family="serif">笔记</text>

  <!-- ============================================ -->
  <!-- A MODULE - Expansion Board (on desk, extended) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Board in extended position -->
    <rect x="200" y="238" width="160" height="6" rx="1" fill="url(#deskTop)" stroke="#a08060" stroke-width="0.5"/>
    <!-- Extended portion (pulled forward) -->
    <polygon points="210,238 350,238 340,220 220,220" fill="url(#deskTop)" stroke="#a08060" stroke-width="0.5"/>
    <polygon points="220,220 340,220 338,215 222,215" fill="#c4a880"/>

    <!-- Items on extension -->
    <rect x="235" y="200" width="50" height="20" rx="1" fill="#b8c8d0" opacity="0.6"/>
    <circle cx="295" cy="205" r="12" fill="rgba(255,255,255,0.4)" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>

    <!-- Labels -->
    <text x="280" y="252" text-anchor="middle" font-size="8" fill="#999" font-family="Inter,sans-serif">A 扩展板</text>
  </g>

  <!-- ============================================ -->
  <!-- B MODULE - Stacking Boxes (on floor beside desk) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Box L (bottom) -->
    <rect x="400" y="290" width="140" height="68" rx="4" fill="url(#boxPlastic)" stroke="#c8c0b0" stroke-width="0.8"/>
    <rect x="404" y="294" width="132" height="30" fill="rgba(255,255,255,0.2)"/>
    <!-- Transparent window -->
    <rect x="412" y="308" width="116" height="34" rx="3" fill="rgba(180,200,210,0.3)" stroke="rgba(160,180,195,0.35)" stroke-width="0.5"/>
    <!-- Contents visible through window -->
    <rect x="420" y="316" width="35" height="18" rx="1" fill="#d0c8b8" opacity="0.5"/>
    <rect x="462" y="318" width="30" height="16" rx="1" fill="#c8c0a8" opacity="0.4"/>
    <rect x="500" y="316" width="20" height="20" rx="1" fill="#ccc4b0" opacity="0.5"/>

    <!-- Box M (middle) -->
    <rect x="415" y="244" width="110" height="52" rx="3" fill="#b8c8c0" stroke="#9ab0a8" stroke-width="0.6"/>
    <rect x="419" y="248" width="102" height="22" fill="rgba(255,255,255,0.12)"/>
    <rect x="425" y="258" width="90" height="26" rx="2" fill="rgba(180,200,210,0.2)" stroke="rgba(150,180,195,0.3)" stroke-width="0.5"/>

    <!-- Box S (top) -->
    <rect x="430" y="208" width="80" height="40" rx="3" fill="#d8d4c8" stroke="#c4bfb0" stroke-width="0.6"/>
    <rect x="434" y="212" width="72" height="16" fill="rgba(255,255,255,0.15)"/>
    <rect x="438" y="220" width="64" height="20" rx="2" fill="rgba(180,200,210,0.18)" stroke="rgba(160,180,195,0.25)" stroke-width="0.5"/>

    <!-- Labels -->
    <text x="470" y="375" text-anchor="middle" font-size="8" fill="#999" font-family="Inter,sans-serif">B 储物箱 ×3</text>
  </g>

  <!-- ============================================ -->
  <!-- POSTERS / DECORATIONS on wall -->
  <!-- ============================================ -->
  <rect x="50" y="80" width="70" height="90" fill="#e8e4d8" stroke="#d0c8b4" stroke-width="1"/>
  <text x="85" y="128" text-anchor="middle" font-size="12" fill="#999">🎵</text>

  <!-- Notice board -->
  <rect x="430" y="70" width="100" height="80" fill="#e8e0d0" stroke="#d0c4b0" stroke-width="1"/>
  <rect x="440" y="78" width="40" height="20" fill="#f5f0e8"/>
  <rect x="485" y="78" width="35" height="15" fill="#f0ece0"/>

  <!-- Clock -->
  <circle cx="400" cy="60" r="18" fill="#f5f0e8" stroke="#d0c8b4" stroke-width="1.5"/>
  <line x1="400" y1="60" x2="400" y2="48" stroke="#666" stroke-width="1.5"/>
  <line x1="400" y1="60" x2="410" y2="60" stroke="#666" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- ANNOTATIONS -->
  <!-- ============================================ -->

  <!-- Callout lines -->
  <line x1="280" y1="215" x2="280" y2="185" stroke="#5a7a6a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="470" y1="210" x2="470" y2="172" stroke="#5a7a6a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="590" y1="200" x2="590" y2="170" stroke="#5a7a6a" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="280" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#5a7a6a" font-family="Inter,sans-serif">A 扩展板 → 桌面深度翻倍</text>
  <text x="470" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#5a7a6a" font-family="Inter,sans-serif">B 储物箱 → 灵活堆叠</text>
  <text x="590" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#5a7a6a" font-family="Inter,sans-serif">C 挂架 → 免打孔安装</text>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#2a3a2e" font-family="Inter,sans-serif">宿舍使用场景 · SmartDorm 三件套安装示意</text>

  <!-- Dimensions callout -->
  <rect x="10" y="500" width="780" height="0" fill="none"/>
  <text x="400" y="515" text-anchor="middle" font-size="9" fill="#999" font-family="Inter,sans-serif">标准两人间宿舍 12㎡ · 桌面 120×60cm · 床铺 200×90cm · 过道 85cm</text>
</svg>

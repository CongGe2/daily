<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Wood texture gradient -->
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a87c"/>
      <stop offset="25%" stop-color="#b8956e"/>
      <stop offset="50%" stop-color="#c4a07a"/>
      <stop offset="75%" stop-color="#b08d64"/>
      <stop offset="100%" stop-color="#c8a87c"/>
    </linearGradient>
    <linearGradient id="woodDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8956e"/>
      <stop offset="100%" stop-color="#8c6d4a"/>
    </linearGradient>
    <!-- Plastic gradients -->
    <linearGradient id="plasticWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f3ef"/>
      <stop offset="40%" stop-color="#e8e4dc"/>
      <stop offset="100%" stop-color="#d0cbc2"/>
    </linearGradient>
    <linearGradient id="plasticGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="50%" stop-color="#d9d4cc"/>
      <stop offset="100%" stop-color="#c4bdb3"/>
    </linearGradient>
    <linearGradient id="plasticBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d8d4"/>
      <stop offset="50%" stop-color="#a8c0ba"/>
      <stop offset="100%" stop-color="#8faaa2"/>
    </linearGradient>
    <!-- Metal gradients -->
    <linearGradient id="metalBrushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4cfc8"/>
      <stop offset="30%" stop-color="#c8c2ba"/>
      <stop offset="60%" stop-color="#b8b0a6"/>
      <stop offset="100%" stop-color="#a09890"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888078"/>
      <stop offset="100%" stop-color="#605850"/>
    </linearGradient>
    <!-- Shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="2" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Floor shadow -->
    <radialGradient id="floorShadowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="floorShadowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="floorShadowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f0ece6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- ============================================ -->
  <!-- A MODULE: Desktop Expansion Board (left) -->
  <!-- ============================================ -->
  <g transform="translate(40, 120)" filter="url(#dropShadow)">
    <!-- Floor shadow -->
    <ellipse cx="220" cy="320" rx="140" ry="20" fill="url(#floorShadowA)"/>

    <!-- Desk surface (existing desk) -->
    <rect x="30" y="260" width="380" height="22" rx="2" fill="url(#wood)" stroke="#a08060" stroke-width="0.5"/>
    <!-- Desk edge highlight -->
    <rect x="30" y="260" width="380" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
    <!-- Desk legs -->
    <rect x="50" y="282" width="12" height="90" rx="1" fill="url(#woodDark)"/>
    <rect x="378" y="282" width="12" height="90" rx="1" fill="url(#woodDark)"/>

    <!-- Expansion board (folded position, sitting on desk) -->
    <rect x="60" y="230" width="320" height="8" rx="1" fill="url(#wood)" stroke="#a08060" stroke-width="0.5"/>
    <!-- Board top surface -->
    <rect x="60" y="225" width="320" height="8" rx="1" fill="url(#wood)" stroke="#a08060" stroke-width="0.5"/>
    <!-- Board thickness edge -->
    <rect x="60" y="232" width="320" height="2" fill="rgba(0,0,0,0.1)"/>

    <!-- Folding mechanism (hinges) -->
    <rect x="100" y="220" width="30" height="14" rx="2" fill="url(#metalBrushed)" stroke="#888" stroke-width="0.5"/>
    <rect x="310" y="220" width="30" height="14" rx="2" fill="url(#metalBrushed)" stroke="#888" stroke-width="0.5"/>
    <!-- Hinge pins -->
    <circle cx="115" cy="227" r="3" fill="url(#metalDark)"/>
    <circle cx="325" cy="227" r="3" fill="url(#metalDark)"/>

    <!-- Expansion board in deployed position (half extended forward) -->
    <polygon points="80,230 400,230 420,140 60,140" fill="url(#wood)" stroke="#a08060" stroke-width="0.5" opacity="0.85"/>
    <!-- Board top -->
    <polygon points="60,140 420,140 415,132 65,132" fill="url(#wood)" opacity="0.9"/>
    <!-- Board edge line -->
    <line x1="60" y1="140" x2="420" y2="140" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

    <!-- Items on expanded board to show usage -->
    <rect x="280" y="155" width="70" height="50" rx="3" fill="#d4d0ca" opacity="0.7"/>
    <text x="315" y="185" text-anchor="middle" font-size="9" fill="#999" font-family="Inter,sans-serif">书本</text>
    <circle cx="160" cy="175" r="18" fill="#e0d8cc" opacity="0.6"/>
    <text x="160" y="179" text-anchor="middle" font-size="7" fill="#999" font-family="Inter,sans-serif">水杯</text>

    <!-- Label -->
    <text x="220" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#4a6b56" font-family="Inter,sans-serif">A · 桌面扩展板</text>
    <text x="220" y="368" text-anchor="middle" font-size="10" fill="#999" font-family="Inter,sans-serif">折叠 6cm → 展开 90cm 深</text>
  </g>

  <!-- ============================================ -->
  <!-- B MODULE: Stacking Boxes (center) -->
  <!-- ============================================ -->
  <g transform="translate(430, 160)" filter="url(#dropShadow)">
    <ellipse cx="130" cy="280" rx="100" ry="18" fill="url(#floorShadowB)"/>

    <!-- Box L (bottom, largest) -->
    <rect x="40" y="195" width="180" height="85" rx="4" fill="url(#plasticWhite)" stroke="#c4bfb4" stroke-width="0.8"/>
    <!-- Front face highlight -->
    <rect x="44" y="199" width="172" height="40" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Transparent window -->
    <rect x="55" y="215" width="150" height="45" rx="3" fill="rgba(200,220,230,0.3)" stroke="rgba(180,195,210,0.5)" stroke-width="0.5"/>
    <!-- Window contents (folded clothes silhouettes) -->
    <rect x="65" y="225" width="40" height="25" rx="2" fill="#a8c0b8" opacity="0.5"/>
    <rect x="115" y="228" width="35" height="22" rx="2" fill="#c0b8a8" opacity="0.5"/>
    <rect x="160" y="225" width="30" height="28" rx="2" fill="#b8c8c0" opacity="0.4"/>
    <!-- Handle -->
    <rect x="100" y="200" width="60" height="6" rx="3" fill="#c8c0b4"/>

    <!-- Box M (middle) -->
    <rect x="60" y="140" width="140" height="65" rx="4" fill="url(#plasticBlue)" stroke="#8faaa2" stroke-width="0.8"/>
    <rect x="64" y="144" width="132" height="30" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Window -->
    <rect x="72" y="157" width="116" height="34" rx="3" fill="rgba(200,220,230,0.25)" stroke="rgba(170,200,210,0.4)" stroke-width="0.5"/>
    <!-- Contents (stationery) -->
    <rect x="82" y="165" width="50" height="8" rx="1" fill="#d0c8b0" opacity="0.5"/>
    <circle cx="145" cy="170" r="10" fill="#c8c0b8" opacity="0.4"/>
    <!-- Handle -->
    <rect x="100" y="146" width="60" height="5" rx="3" fill="#a0b8b0"/>

    <!-- Box S (top, smallest) -->
    <rect x="80" y="95" width="100" height="50" rx="4" fill="url(#plasticGray)" stroke="#b4ada4" stroke-width="0.8"/>
    <rect x="84" y="99" width="92" height="22" rx="2" fill="rgba(255,255,255,0.12)"/>
    <!-- Window -->
    <rect x="90" y="108" width="80" height="25" rx="3" fill="rgba(200,220,230,0.2)" stroke="rgba(180,195,210,0.35)" stroke-width="0.5"/>
    <!-- Handle -->
    <rect x="100" y="99" width="60" height="5" rx="3" fill="#c0b8b0"/>

    <!-- Interlocking groove indicators -->
    <rect x="55" y="135" width="8" height="4" rx="1" fill="rgba(0,0,0,0.06)"/>
    <rect x="197" y="135" width="8" height="4" rx="1" fill="rgba(0,0,0,0.06)"/>
    <rect x="75" y="90" width="8" height="4" rx="1" fill="rgba(0,0,0,0.06)"/>
    <rect x="177" y="90" width="8" height="4" rx="1" fill="rgba(0,0,0,0.06)"/>

    <!-- Label -->
    <text x="130" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#4a6b56" font-family="Inter,sans-serif">B · 堆叠储物箱</text>
    <text x="130" y="328" text-anchor="middle" font-size="10" fill="#999" font-family="Inter,sans-serif">3 尺寸 · 透明视窗 · 互锁结构</text>
  </g>

  <!-- ============================================ -->
  <!-- C MODULE: Bedside Rack (right, wall-mounted) -->
  <!-- ============================================ -->
  <g transform="translate(620, 80)" filter="url(#dropShadow)">
    <ellipse cx="80" cy="380" rx="70" ry="14" fill="url(#floorShadowC)"/>

    <!-- Wall section (behind the rack) -->
    <rect x="0" y="0" width="160" height="360" fill="#f0ece4" stroke="#e0d8cc" stroke-width="0.5" rx="1"/>

    <!-- Bed frame rail (vertical) -->
    <rect x="20" y="40" width="10" height="320" rx="3" fill="url(#metalDark)"/>
    <rect x="22" y="42" width="3" height="316" rx="1" fill="rgba(255,255,255,0.1)"/>

    <!-- Bed rail (horizontal) -->
    <rect x="0" y="70" width="50" height="8" rx="2" fill="url(#metalDark)"/>

    <!-- Bed frame connection -->
    <rect x="22" y="65" width="6" height="18" rx="1" fill="url(#metalBrushed)"/>

    <!-- RACK - Main frame (aluminum) -->
    <rect x="35" y="140" width="110" height="18" rx="2" fill="url(#metalBrushed)" stroke="#a09890" stroke-width="0.5"/>
    <!-- Top highlight on frame -->
    <rect x="37" y="141" width="106" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>

    <!-- Rack tray (ABS plastic) -->
    <rect x="40" y="158" width="100" height="55" rx="3" fill="url(#plasticWhite)" stroke="#c4bfb4" stroke-width="0.5"/>
    <!-- Tray interior -->
    <rect x="43" y="161" width="94" height="49" rx="2" fill="#e8e4dc"/>

    <!-- Phone slot -->
    <rect x="55" y="170" width="18" height="35" rx="2" fill="#d0c8bc"/>
    <!-- Phone silhouette -->
    <rect x="57" y="175" width="14" height="25" rx="1.5" fill="#3a3a3a"/>
    <rect x="59" y="177" width="10" height="18" rx="0.5" fill="#1a1a5e"/>

    <!-- USB cable routing holes -->
    <circle cx="85" cy="178" r="5" fill="#c0b8ac" stroke="#b0a89c" stroke-width="0.5"/>
    <circle cx="85" cy="178" r="2" fill="#888"/>
    <circle cx="100" cy="178" r="5" fill="#c0b8ac" stroke="#b0a89c" stroke-width="0.5"/>
    <circle cx="100" cy="178" r="2" fill="#888"/>

    <!-- Cup holder area -->
    <circle cx="120" cy="190" r="16" fill="none" stroke="#d0c8bc" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="120" y="194" text-anchor="middle" font-size="7" fill="#999" font-family="Inter,sans-serif">杯位</text>

    <!-- Cable illustration -->
    <path d="M 85,183 Q 80,200 75,210" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 100,183 Q 105,200 110,210" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Water bottle silhouette in cup holder -->
    <rect x="114" y="165" width="12" height="25" rx="4" fill="#a8c8d8" opacity="0.5"/>

    <!-- Mounting clamp (attaching to bed rail) -->
    <rect x="38" y="125" width="12" height="20" rx="2" fill="url(#metalDark)"/>
    <circle cx="44" cy="135" r="3" fill="url(#metalBrushed)"/>
    <rect x="140" y="125" width="12" height="20" rx="2" fill="url(#metalDark)"/>
    <circle cx="146" cy="135" r="3" fill="url(#metalBrushed)"/>

    <!-- Label -->
    <text x="90" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#4a6b56" font-family="Inter,sans-serif">C · 床边挂架</text>
    <text x="90" y="438" text-anchor="middle" font-size="10" fill="#999" font-family="Inter,sans-serif">手机支架 · 走线 · 杯位</text>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#2a3a2e" font-family="Inter,sans-serif">SmartDorm 模块化宿舍收纳系统</text>
  <text x="400" y="62" text-anchor="middle" font-size="11" fill="#999" font-family="Inter,sans-serif">产品展示 · 等比例渲染图</text>
</svg>

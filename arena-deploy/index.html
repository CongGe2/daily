<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Eclipse Arena v0.28</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;position:absolute;inset:0;z-index:1}
.m{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#0a0808;gap:14px}
.m.h{display:none}
h1{font-size:28px;color:#c8a050}
.cards{display:flex;gap:12px}
.cd{width:100px;padding:14px 8px;border-radius:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;transition:all .2s}
.cd:hover{background:rgba(255,255,255,.1);border-color:#c8a050}
.av2{font-size:32px;display:block;margin-bottom:6px}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:25;background:rgba(8,6,4,.92);gap:14px}
.panel.h{display:none}
.panel .t{font-size:32px;font-weight:900;color:#c44}
.pbtn{padding:12px 30px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;border:none;color:#fff;transition:all .15s}
.pbtn.green{background:#5c5}.pbtn.red{background:#c44}.pbtn.ghost{background:rgba(255,255,255,.06);color:rgba(200,180,150,.6)}
.pbtn:hover{transform:scale(1.04)}
#dbg{position:absolute;top:4px;left:4px;font-size:10px;color:#0f0;font-family:monospace;z-index:30;pointer-events:none}
#err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f44;font-size:20px;z-index:50;text-align:center;pointer-events:none}
</style></head><body>
<canvas id="c"></canvas><div id="dbg">v0.28</div><div id="err"></div>

<div class="m" id="menu"><div style="text-align:center">
<h1>ECLIPSE ARENA v0.28</h1><div class="cards">
<div class="cd" id="btnW"><span class="av2">⚔️</span>Warrior</div>
<div class="cd" id="btnG"><span class="av2">🔫</span>Gunner</div>
</div></div></div>

<div class="panel h" id="go"><div style="text-align:center">
<div class="t">Defeated</div><div id="goInfo" style="font-size:14px;color:rgba(200,180,150,.4)"></div>
<button class="pbtn red" id="btnRetry">↺ Retry</button>
<button class="pbtn ghost" id="btnMenu">🏠 Menu</button>
</div></div>

<div class="panel h" id="shop"><div style="text-align:center">
<div class="t" style="color:#5c5">⬆ Level Up!</div><div id="shopInfo" style="font-size:13px;color:rgba(200,180,150,.4)"></div><div id="shopBtns" style="display:flex;flex-direction:column;gap:8px;max-width:300px;margin-top:12px"></div>
<button class="pbtn green" id="btnContinue">▶ Continue</button>
</div></div>

<script>
(function(){
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W=innerWidth,H=innerHeight;canvas.width=W;canvas.height=H;onresize=function(){W=canvas.width=innerWidth;H=canvas.height=innerHeight};
var ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}}
var CH={warrior:{n:'Warrior',c:'#e85a30',hp:200,sp:3},gunner:{n:'Gunner',c:'#4ad8b0',hp:120,sp:3}};
var ET=[{hp:30,sp:2,sz:10,dmg:6,sc:100,co:'#e87050'},{hp:22,sp:2.1,sz:9,dmg:4,sc:120,co:'#e89040',r:1},{hp:18,sp:2.4,sz:8,dmg:10,sc:180,co:'#ff4060'}];
var ARENAS=[[[-420,-300],[420,-300],[420,300],[-420,300]],[[0,-330],[300,-150],[180,300],[-180,300],[-300,-150]],[[0,-390],[360,0],[0,390],[-360,0]],[[-240,-330],[240,-330],[390,0],[240,330],[-240,330],[-390,0]]];
var arena=ARENAS[0],arenaColor='rgba(200,150,80,.3)';
function insidePoly(x,y){var in2=false;for(var i=0,j=arena.length-1;i<arena.length;j=i++){var xi=arena[i][0],yi=arena[i][1],xj=arena[j][0],yj=arena[j][1];if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)in2=!in2}return in2}
function randArena(){var a=ARENAS[Math.floor(Math.random()*ARENAS.length)];arena=a.v}

var ck,cd,run=false,f=0,pl={alive:false},en=[],pr=[],pa=[],sc=0,ki=0,wave=1,sx=0,sy=0,si=0;
var weaponLvl=0,spdLvl=0,xp=0,xpNeed=100,plv=1,combo=0,comboTimer=0;

var K={},M={x:0,y:0,d:false};
onkeydown=function(e){K[e.key.toLowerCase()]=true;ia()};onkeyup=function(e){K[e.key.toLowerCase()]=false};
canvas.onmousemove=function(e){M.x=e.clientX;M.y=e.clientY};
canvas.onmousedown=function(e){if(e.button===0){M.d=true;ia()}};canvas.onmouseup=function(e){if(e.button===0)M.d=false};

function log(t){document.getElementById('dbg').textContent='v0.28 '+t}

function startGame(key){
  ck=key;cd=CH[key];ia();randArena();
  document.getElementById('menu').classList.add('h');
  document.getElementById('go').classList.add('h');
  document.getElementById('shop').classList.add('h');
  pl={x:0,y:0,hp:cd.hp,mh:cd.hp,ang:Math.PI/2,alive:true,stealth:false,at:0,acd:0,inv:0,s1cd:0,s2cd:0,dt:0,dvx:0,dvy:0,sb:0,db:0,shT:0,defBuff:0};
  en=[];pr=[];pa=[];sc=0;ki=0;wave=1;combo=0;comboTimer=0;sx=0;sy=0;si=0;f=0;xp=0;xpNeed=100;plv=1;
  for(var i=0;i<5;i++)spawnEnemy();
  run=true;log('START '+key)
}

function spawnEnemy(){
  var ei=Math.floor(Math.random()*arena.length),j=(ei+1)%arena.length,t=Math.random();
  var sx=arena[ei][0]+(arena[j][0]-arena[ei][0])*t,sy=arena[ei][1]+(arena[j][1]-arena[ei][1])*t;
  var ang2=Math.atan2(pl.y-sy,pl.x-sx);
  var et=ET[Math.floor(Math.random()*ET.length)];
  en.push({x:sx+Math.cos(ang2)*140,y:sy+Math.sin(ang2)*140,hp:et.hp,mh:et.hp,sp:et.sp,sz:et.sz,dmg:et.dmg,sc:et.sc,co:et.co,r:et.r||0,shCD:0,stun:0,alive:true});
}

function sp(x,y,n,c,s,l,z){s=s||3;l=l||16;z=z||3;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,spd=Math.random()*s+s*.3;pa.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,l:l,maxL:l,c:c,size:Math.random()*z+z*.5})}}
function sf2(x,y,t,c){c=c||'#fff';pa.push({x:x,y:y,vx:0,vy:-2,l:28,maxL:28,c:c,text:t,isTxt:true})}
function ash(i){si=Math.max(si,i)}

function dmgE(e2,dmg){e2.hp-=dmg;e2.stun=8;sp(e2.x,e2.y,4,e2.co,3,8);sf2(e2.x,e2.y-8,''+Math.round(dmg));ash(2);if(e2.hp<=0){e2.alive=false;sp(e2.x,e2.y,12,e2.co,5,14);sf2(e2.x,e2.y-16,'+'+e2.sc,cd.c);sc+=e2.sc;ki++;combo++;comboTimer=100;xp+=e2.sc;if(xp>=xpNeed){xp-=xpNeed;plv++;xpNeed=Math.floor(100*Math.pow(1.4,plv-1));levelUp()}ash(3)}}
function hitP(dmg){if(pl.shT>0)return;pl.hp-=dmg;pl.inv=22;sp(pl.x,pl.y,8,'#f44',5,12);sf2(pl.x,pl.y-8,'-'+dmg,'#f44');ash(6);if(pl.hp<=0){pl.hp=0;pl.alive=false;run=false;gameOver()}}
function levelUp(){run=false;pl.mh=Math.floor(cd.hp*(1+plv*.1));pl.hp=Math.min(pl.mh,pl.hp+30);document.getElementById('shop').classList.remove('h');document.getElementById('shopInfo').textContent='Lv'+plv+' | Score:'+sc+' | Wave:'+wave;buildShop()}
function gameOver(){document.getElementById('go').classList.remove('h');document.getElementById('goInfo').textContent='Lv'+plv+' · Wave '+wave+' · Kills '+ki+' · '+sc+' pts';log('DEAD')}

function buildShop(){
  var g=document.getElementById('shopBtns');g.innerHTML='';
  function addBtn(label,canBuy,fn){
    var b=document.createElement('button');b.className='pbtn ghost';b.textContent=label;b.style.cssText='width:100%;padding:8px';
    if(!canBuy){b.disabled=true;b.style.opacity='.3'}else{b.onclick=fn}
    g.appendChild(b);
  }
  var wc=Math.pow(2,weaponLvl)*500;addBtn('⚡ Weapon → Tier '+(weaponLvl+1)+' ('+wc+' pts)',weaponLvl<6&&sc>=wc,function(){sc-=wc;weaponLvl++;buildShop()});
  addBtn('❤️ Max HP +15% ('+((plv)*500)+' pts)',sc>=plv*500,function(){sc-=plv*500;pl.mh=Math.floor(cd.hp*(1+plv*.15));pl.hp=Math.min(pl.mh,pl.hp+20);buildShop()});
}

function U(dt){
  if(!run)return;f++;dt=Math.min(dt,.15);
  if(comboTimer>0){comboTimer-=dt*60;if(comboTimer<=0)combo=0}
  if(pl.acd>0)pl.acd-=dt*60;if(pl.at>0)pl.at-=dt;if(pl.inv>0)pl.inv--;
  if(pl.dt>0){pl.x+=pl.dvx*dt;pl.y+=pl.dvy*dt;pl.dt--}
  var spd=cd.sp*(pl.stealth?1:1);
  var mx=0,my=0;if(K.w||K.arrowup)my=-1;if(K.s||K.arrowdown)my=1;if(K.a||K.arrowleft)mx=-1;if(K.d||K.arrowright)mx=1;
  if(mx||my){var l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;pl.ang=Math.atan2(my,mx)}
  if(pl.dt<=0){pl.x+=mx*spd*dt*60;pl.y+=my*spd*dt*60}
  if(!insidePoly(pl.x,pl.y)){pl.hp-=15*dt}
  // Attack
  var wdmg=ck==='warrior'?10+weaponLvl*5:8+weaponLvl*3;
  if(M.d&&pl.acd<=0&&pl.dt<=0){ia();pl.acd=ck==='warrior'?28:14;pl.at=.2;
    if(ck==='warrior'){en.forEach(function(e2){if(!e2.alive)return;var dx=e2.x-pl.x,dy=e2.y-pl.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);var diff=ang-pl.ang;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;if(dist<60&&Math.abs(diff)<1.2){dmgE(e2,wdmg);e2.x+=Math.cos(ang)*8;e2.y+=Math.sin(ang)*8}})}
    else{var ma=Math.atan2(M.y-H/2,M.x-W/2);for(var b=0;b<2+weaponLvl;b++){var sp2=b<2?0:(Math.random()-.5)*Math.PI/6;pr.push({x:pl.x,y:pl.y,vx:Math.cos(ma+sp2)*14,vy:Math.sin(ma+sp2)*14,dmg:wdmg*.85,co:cd.c,l:60,ar:true,pierce:true,hit:[]})}}}
  // Projectiles
  pr=pr.filter(function(p2){p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.l--;if(p2.l<=0)return false;if(p2.ar&&f%2===0)sp(p2.x,p2.y,1,cd.c+'60',1,3);if(p2.en){if(Math.hypot(p2.x-pl.x,p2.y-pl.y)<14&&pl.inv<=0&&pl.dt<=0&&pl.alive){hitP(p2.dmg);return false}return true}for(var i=en.length-1;i>=0;i--){var e2=en[i];if(!e2.alive)continue;if(p2.pierce&&p2.hit.indexOf(i)>=0)continue;if(Math.hypot(p2.x-e2.x,p2.y-e2.y)<e2.sz+5){if(p2.pierce){p2.hit.push(i);p2.dmg*=.7;dmgE(e2,p2.dmg);if(!e2.alive)en.splice(i,1)}else{dmgE(e2,p2.dmg);if(!e2.alive)en.splice(i,1);return false}}}return true});
  // Enemy AI
  en.forEach(function(e2){if(!e2.alive)return;if(e2.stun>0){e2.stun--;return}var dx=pl.x-e2.x,dy=pl.y-e2.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);e2.x+=Math.cos(ang)*e2.sp*dt*60;e2.y+=Math.sin(ang)*e2.sp*dt*60;if(e2.r&&dist<350&&dist>80&&e2.shCD<=0){e2.shCD=100;pr.push({x:e2.x,y:e2.y,vx:Math.cos(ang)*5,vy:Math.sin(ang)*5,dmg:e2.dmg,co:e2.co,l:80,en:true})}if(e2.shCD>0)e2.shCD--;if(dist<e2.sz+16&&pl.inv<=0&&pl.dt<=0&&pl.alive)hitP(e2.dmg);if(!insidePoly(e2.x,e2.y)){e2.hp-=10*dt}});
  en=en.filter(function(e2){return e2.alive});
  if(en.length<3+wave*2&&f%40===0)spawnEnemy();
  if(f%600===0)wave++;
  pa=pa.filter(function(p2){if(p2.isTxt){p2.y+=p2.vy*dt*60;p2.l--;return p2.l>0}p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.vx*=.84;p2.vy*=.84;p2.l--;return p2.l>0});
  si*=.82;if(run){sx=(Math.random()-.5)*si;sy=(Math.random()-.5)*si}
}

function R2(){
  ctx.fillStyle='#0a0604';ctx.fillRect(0,0,W,H);if(!run)return;
  var ax=W/2,ay=H/2;
  ctx.strokeStyle='rgba(255,255,255,.01)';ctx.lineWidth=.5;
  for(var x2=50;x2<W;x2+=50){ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,H);ctx.stroke()}
  for(var y2=50;y2<H;y2+=50){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(W,y2);ctx.stroke()}
  ctx.save();ctx.translate(sx,sy);
  ctx.beginPath();arena.forEach(function(v,i){var sx2=ax+v[0],sy2=ay+v[1];if(i===0)ctx.moveTo(sx2,sy2);else ctx.lineTo(sx2,sy2)});ctx.closePath();
  ctx.fillStyle='#1a1008';ctx.fill();ctx.strokeStyle=arenaColor;ctx.lineWidth=4;ctx.stroke();
  function mx(x){return ax+x}function my(y){return ay+y}
  pa.forEach(function(p2){if(p2.isTxt){var a=p2.l/28;ctx.fillStyle=p2.c;ctx.globalAlpha=a;ctx.font='bold 12px Inter';ctx.textAlign='center';ctx.fillText(p2.text,mx(p2.x),my(p2.y));ctx.globalAlpha=1}else{var a=p2.l/p2.maxL;ctx.fillStyle=p2.c;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(mx(p2.x),my(p2.y),p2.size*a,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}});
  pr.forEach(function(p2){var px2=mx(p2.x),py2=my(p2.y);ctx.fillStyle=p2.co;ctx.beginPath();ctx.arc(px2,py2,3,0,Math.PI*2);ctx.fill()});
  en.forEach(function(e2){if(!e2.alive)return;var ex=mx(e2.x),ey=my(e2.y);ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(ex,ey+2,e2.sz,e2.sz*.4,0,0,Math.PI*2);ctx.fill();var eg=ctx.createRadialGradient(ex-e2.sz*.2,ey-e2.sz*.3,e2.sz*.1,ex,ey,e2.sz);eg.addColorStop(0,'#fff');eg.addColorStop(.4,e2.co);eg.addColorStop(1,'#0a0604');ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex,ey,e2.sz,0,Math.PI*2);ctx.fill()});
  if(pl.alive){var px2=mx(pl.x),py2=my(pl.y),z=1.3,da=pl.ang;
    if(pl.inv>0&&Math.floor(pl.inv/4)%2===0)ctx.globalAlpha=.25;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.ellipse(px2,py2+8*z,12*z,4*z,0,0,Math.PI*2);ctx.fill();
    var g=ctx.createRadialGradient(px2,py2-2*z,3*z,px2,py2-2*z,20*z);g.addColorStop(0,cd.c+'50');g.addColorStop(.6,cd.c+'10');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(px2,py2-2*z,20*z,0,Math.PI*2);ctx.fill();
    // Legs
    ctx.fillStyle=ck==='warrior'?'#5a4030':'#4a7060';
    [1.3,-1.3].forEach(function(side){ctx.save();ctx.translate(px2+Math.cos(da+side)*3.5*z,py2+Math.sin(da+side)*3.5*z);ctx.rotate(da);var rx=2.5*z;ctx.beginPath();ctx.moveTo(-rx,0);ctx.lineTo(rx,0);ctx.arcTo(2.5*z,9*z,0,9*z,rx);ctx.lineTo(-2.5*z,9*z);ctx.arcTo(-rx,0,-2.5*z,0,rx);ctx.fill();ctx.restore()});
    // Body
    ctx.fillStyle=ck==='warrior'?'#6a4a38':'#4a6858';ctx.beginPath();ctx.ellipse(px2,py2-6*z,6*z,8*z,da,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#e8d0b8';ctx.beginPath();ctx.arc(px2+Math.cos(da)*2*z,py2-16*z,5*z,0,Math.PI*2);ctx.fill();ctx.fillStyle=ck==='warrior'?'#7a5a42':'#5a8070';ctx.beginPath();ctx.arc(px2+Math.cos(da)*2*z,py2-18*z,5*z,Math.PI,0);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px2+Math.cos(da)*5.5*z,py2-16*z,1.5*z,0,Math.PI*2);ctx.fill();
    var ra=da+(pl.at>0?-1.5:-.4);ctx.strokeStyle='#e8d0b8';ctx.lineWidth=3*z;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px2+Math.cos(da)*2*z,py2-8*z);ctx.lineTo(px2+Math.cos(ra)*11*z,py2+Math.sin(ra)*11*z-8*z);ctx.stroke();
    if(ck==='warrior'){var swAngle=pl.at>0?(pl.ang-1.2+pl.at*2.4):(pl.ang+.5);ctx.strokeStyle='#fff';ctx.lineWidth=5*z;ctx.beginPath();ctx.moveTo(px2+Math.cos(swAngle-.3)*10*z,py2+Math.sin(swAngle-.3)*10*z-8*z);ctx.lineTo(px2+Math.cos(swAngle)*22*z,py2+Math.sin(swAngle)*22*z-8*z);ctx.stroke()}
    else{ctx.strokeStyle='#c8b898';ctx.lineWidth=2*z;ctx.beginPath();ctx.arc(px2+Math.cos(da-.5)*12*z,py2+Math.sin(da-.5)*12*z-7*z,8*z,-da-.7,-da+.7);ctx.stroke()}
    ctx.globalAlpha=1}
  ctx.restore();
  // HUD
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(10,10,200,16);ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(12,12,196,12);
  var hpPct=pl.hp/pl.mh;ctx.fillStyle=hpPct>.5?'#c44':hpPct>.25?'#e84':'#e44';ctx.fillRect(12,12,196*hpPct,12);
  ctx.fillStyle='#fff';ctx.font='700 11px Inter';ctx.textAlign='left';ctx.fillText(cd.n+' Lv'+plv,14,10);ctx.fillText(Math.ceil(pl.hp)+'/'+pl.mh,14,36);
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(14,32,192,4);ctx.fillStyle='#88f';ctx.fillRect(14,32,192*(xp/xpNeed),4);
  ctx.fillStyle='#c8a050';ctx.font='bold 18px Inter';ctx.textAlign='right';ctx.fillText('W'+wave+' K'+ki,W-14,26);
  ctx.fillStyle='rgba(200,180,150,.5)';ctx.font='10px Inter';ctx.fillText('$'+sc,W-14,42);
}

// Event bindings
document.getElementById('btnW').addEventListener('click',function(){startGame('warrior')});
document.getElementById('btnG').addEventListener('click',function(){startGame('gunner')});
document.getElementById('btnRetry').addEventListener('click',function(){startGame(ck)});
document.getElementById('btnMenu').addEventListener('click',function(){run=false;document.getElementById('go').classList.add('h');document.getElementById('shop').classList.add('h');document.getElementById('menu').classList.remove('h')});
document.getElementById('btnContinue').addEventListener('click',function(){document.getElementById('shop').classList.add('h');run=true});
log('READY');

var lt=performance.now();
function loop(){var dt=(performance.now()-lt)/1000;lt=performance.now();U(dt);R2();requestAnimationFrame(loop)}
loop();
})();
</script></body></html>

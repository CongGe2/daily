<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>深夜食堂 · Midnight Grill 3D</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1008">
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Inter","PingFang SC",sans-serif;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}canvas{display:block}#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:#1a1008;color:#c8a050;font-size:20px;transition:opacity .5s}#loading.done{opacity:0;pointer-events:none}#ui{position:fixed;inset:0;pointer-events:none;z-index:10}#ui>*{pointer-events:auto}#hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:700;font-size:15px}#money{color:#ffd700}#day{color:#fff}#combo{color:#ff0;font-size:18px}#orders{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:10px}#bottomUI{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px}#bottomUI button{padding:12px 24px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;backdrop-filter:blur(4px)}#bottomUI button:hover{background:rgba(255,255,255,.1);border-color:#c8a050}#bottomUI button:active{transform:scale(.95)}#bottomUI button.sel{border-color:#fa0;background:rgba(255,170,0,.2);box-shadow:0 0 20px rgba(255,170,0,.3)}#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700;color:#ff0;pointer-events:none;text-shadow:0 0 20px rgba(255,255,0,.5);opacity:0;transition:opacity .3s}#msg.show{opacity:1}</style>
</head>
<body>
<div id="loading">🔥 深夜食堂 · Loading 3D...</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud"><span id="money">💰 $0</span><span id="day">Day 1</span><span id="combo"></span></div>
  <div id="orders"></div>
  <div id="bottomUI"></div>
  <div id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// ====== SETUP ======
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:false});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#0a0618');
scene.fog=new THREE.Fog('#0a0618',8,30);

const camera=new THREE.PerspectiveCamera(45,W/H,0.5,50);
camera.position.set(0,8,10);
camera.lookAt(0,1.5,0);

// Lighting
const ambient=new THREE.AmbientLight('#3a2820',1.5);scene.add(ambient);
const sun=new THREE.DirectionalLight('#ffe8c0',4);sun.position.set(5,10,3);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=0.5;sun.shadow.camera.far=30;
sun.shadow.camera.left=-10;sun.shadow.camera.right=10;sun.shadow.camera.top=10;sun.shadow.camera.bottom=-10;
sun.shadow.bias=-.0003;scene.add(sun);
const point=new THREE.PointLight('#ff8844',8,12,1.5);point.position.set(0,2.5,-3);scene.add(point);

// Audio
let ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.03){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.3,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

// ====== 3D KITCHEN ======
// Floor
const floorGeo=new THREE.PlaneGeometry(16,12);
const floorMat=new THREE.MeshStandardMaterial({color:'#3a2010',roughness:.9});
const floor=new THREE.Mesh(floorGeo,floorMat);floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// Back wall
const wallGeo=new THREE.PlaneGeometry(16,6);
const wallMat=new THREE.MeshStandardMaterial({color:'#2a1810',roughness:.85});
const wall=new THREE.Mesh(wallGeo,wallMat);wall.position.set(0,3,-6);wall.receiveShadow=true;scene.add(wall);

// Counter (wooden table)
const counterGeo=new THREE.BoxGeometry(10,.3,5);
const counterMat=new THREE.MeshStandardMaterial({color:'#5a3820',roughness:.6});
const counter=new THREE.Mesh(counterGeo,counterMat);counter.position.y=1.2;counter.castShadow=true;counter.receiveShadow=true;scene.add(counter);

// Counter top surface (lighter)
const topGeo=new THREE.BoxGeometry(10,.05,5);
const topMat=new THREE.MeshStandardMaterial({color:'#7a5030',roughness:.4});
const top=new THREE.Mesh(topGeo,topMat);top.position.y=1.375;top.receiveShadow=true;scene.add(top);

// ====== COOKING STATIONS (clickable 3D objects) ======
const stations=[];
function createStation(x,z,name,color,icon){
  const group=new THREE.Group();
  // Base plate
  const baseGeo=new THREE.CylinderGeometry(.6,.65,.08,32);
  const base=new THREE.Mesh(baseGeo,new THREE.MeshStandardMaterial({color:'#333',roughness:.4,metalness:.6}));
  base.position.y=1.42;group.add(base);
  // Station surface
  const surfGeo=new THREE.CylinderGeometry(.55,.55,.04,32);
  const surf=new THREE.Mesh(surfGeo,new THREE.MeshStandardMaterial({color,roughness:.3,metalness:.2}));
  surf.position.y=1.48;group.add(surf);
  // Glow ring
  const ringGeo=new THREE.TorusGeometry(.55,.03,8,32);
  const ring=new THREE.Mesh(ringGeo,new THREE.MeshStandardMaterial({color,roughness:.2,metalness:.8,emissive:color,emissiveIntensity:.3}));
  ring.rotation.x=Math.PI/2;ring.position.y=1.49;group.add(ring);

  group.position.set(x,0,z);
  group.castShadow=true;group.receiveShadow=true;
  group.userData={name,color,icon,action:name.toLowerCase().includes('grill')?'grill':name.toLowerCase().includes('fry')?'fryer':'prep',timer:0,maxT:0,item:null,state:'idle'};
  scene.add(group);
  stations.push(group);
  return group;
}

const grillSt=createStation(-2.5,-1,'Grill','#ff4422');
const fryerSt=createStation(2.5,-1,'Fryer','#ffaa22');
const prepSt=createStation(0,0,'Prep','#888888');
const serveSt=createStation(0,1.5,'Serve','#ffffff');

// ====== FOOD ITEMS ======
const foodItems=[];
function createFood(ico,color,size){
  const group=new THREE.Group();
  const bodyGeo=new THREE.SphereGeometry(size,.5+Math.random()*.3,8,6);
  bodyGeo.scale(1,.6,1);
  const body=new THREE.Mesh(bodyGeo,new THREE.MeshStandardMaterial({color,roughness:.5}));
  body.position.y=1.55;group.add(body);
  group.visible=false;group.userData={ico,color,raw:true};scene.add(group);
  foodItems.push(group);
  return group;
}
const foods=['🥩','🍗','🐟','🥔','🍚','🥬'].map((ico,i)=>{
  const colors=['#d44','#e8a','#f8a','#da8','#ff8','#4a4'];
  return createFood(ico,colors[i],.15+.05*i);
});

// ====== RAYCASTER ======
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selectedFood=null;

function onPointer(e){
  mouse.x=(e.clientX/W)*2-1;
  mouse.y=-(e.clientY/H)*2+1;
}
window.addEventListener('pointermove',onPointer);
window.addEventListener('pointerdown',(e)=>{
  onPointer(e);ia();
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(stations,true);
  if(hits.length>0){
    let st=hits[0].object;
    while(st&&!st.userData.name)st=st.parent;
    if(st&&st.userData.name)handleStationClick(st.userData,st);
  }
});

// ====== GAME LOGIC ======
let money=0,day=1,combo=0,ctimer=0;
let orders=[],ordTimer=0,ordInt=200,servedToday=0;

function addOrder(){
  const recipes=[{n:'烤牛肉',ico:'🥩',ing:[0],time:200,price:12},{n:'炸鸡',ico:'🍗',ing:[1],time:240,price:15},{n:'烤鱼',ico:'🐟',ing:[2],time:220,price:18}];
  const r=recipes[Math.floor(Math.random()*recipes.length)];
  orders.push({...r,timer:r.time,served:false});
  updateOrdersUI();
}
function completeOrder(idx){
  const o=orders[idx];if(!o||o.served)return;
  money+=o.price;servedToday++;combo++;ctimer=80;
  o.served=true;orders.splice(idx,1);
  sfx(1400,.04,'sine',.03);setTimeout(()=>sfx(2000,.05,'sine',.025),50);
  updateOrdersUI();updateHUD();
  setTimeout(()=>{if(orders.length<3)addOrder()},600);
  if(servedToday>=5+day*2){day++;servedToday=0;sfx(300,.08,'sine',.05);setTimeout(()=>sfx(600,.07,'sine',.05),60);updateHUD();}
}
function updateHUD(){
  document.getElementById('money').textContent='💰 $'+money;
  document.getElementById('day').textContent='Day '+day;
  document.getElementById('combo').textContent=combo>=3?combo+'x COMBO!':'';
}
function updateOrdersUI(){
  const el=document.getElementById('orders');
  el.innerHTML=orders.map(o=>`<div style="background:rgba(0,0,0,.8);padding:6px 12px;border-radius:8px;color:#fff;font-size:12px;text-align:center;border:1px solid rgba(255,255,255,.15)">${o.ico} ${o.n}<br><span style="color:#c8a050">$${o.price}</span><br><div style="height:2px;background:rgba(255,255,255,.1);margin-top:4px"><div style="height:2px;background:${o.timer/o.time>.5?'#5c5':'#f80'};width:${(o.timer/o.time*100)}%"></div></div></div>`).join('');
}

function handleStationClick(data,obj){
  if(data.state==='idle'&&selectedFood){
    // Place food on station
    data.item=selectedFood.userData;data.state='cooking';data.timer=data.action==='grill'?180:data.action==='fryer'?220:80;data.maxT=data.timer;
    selectedFood.visible=false;selectedFood=null;
    sfx(200,.15,'sawtooth',.02);
    // Cooking visual - change ring color
    obj.children.forEach(c=>{if(c.geometry?.type==='TorusGeometry')c.material.emissive.set('#ff8800');c.material.emissiveIntensity=1});
  }else if(data.state==='done'&&data.item){
    // Pick up cooked food - check if matches any order
    const found=orders.findIndex(o=>!o.served&&data.item.ico===o.ico);
    if(found>=0){completeOrder(found);data.item=null;data.state='idle';data.timer=0;
      obj.children.forEach(c=>{if(c.geometry?.type==='TorusGeometry'){c.material.emissive.set(data.color);c.material.emissiveIntensity=.3}});
    }
  }
}

// Ingredient buttons
const ingBtns=['🥩 Beef','🍗 Chicken','🐟 Fish','🥔 Potato','🍚 Rice','🥬 Veg'];
const btnsEl=document.getElementById('bottomUI');
ingBtns.forEach((t,i)=>{
  const b=document.createElement('button');b.textContent=t;
  b.addEventListener('click',()=>{
    ia();sfx(600,.04,'sine',.02);
    if(selectedFood){
      selectedFood.visible=false;
      document.querySelectorAll('#bottomUI button').forEach(x=>x.classList.remove('sel'));
    }
    selectedFood=foods[i];selectedFood.visible=true;selectedFood.position.set(0,1.65,0);
    b.classList.add('sel');
    document.getElementById('msg').textContent='已选 '+t.split(' ')[0]+' → 点击设备放入';
    document.getElementById('msg').classList.add('show');
    setTimeout(()=>document.getElementById('msg').classList.remove('show'),1500);
  });
  btnsEl.appendChild(b);
});

// ====== GAME LOOP ======
const clock=new THREE.Clock();
function loop(){
  const dt=Math.min(clock.getDelta(),.2);
  // Timers
  if(ctimer>0){ctimer-=dt*60;if(ctimer<=0)combo=0}
  stations.forEach(st=>{
    const d=st.userData;
    if(d.timer>0){d.timer-=dt*60;if(d.timer<=0){d.state='done';d.timer=0;
      st.children.forEach(c=>{if(c.geometry?.type==='TorusGeometry'){c.material.emissive.set('#ffaa00');c.material.emissiveIntensity=1.5}});
    }}
  });
  // Order timers
  ordTimer+=dt*60;if(ordTimer>ordInt&&orders.length<3){addOrder();ordTimer=0}
  orders.forEach(o=>{if(!o.served){o.timer-=dt*60;if(o.timer<=0){o.served=true;orders=orders.filter(x=>!x.served);combo=0;updateOrdersUI()}}});
  updateOrdersUI();updateHUD();

  // Move selected food with pointer
  if(selectedFood){
    raycaster.setFromCamera(mouse,camera);
    const plane=new THREE.Plane(new THREE.Vector3(0,1,0),-1.55);
    const pt=new THREE.Vector3();raycaster.ray.intersectPlane(plane,pt);
    if(pt){selectedFood.position.copy(pt);selectedFood.position.y=1.6}
  }

  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

// Start
addOrder();addOrder();
document.getElementById('loading').classList.add('done');
updateHUD();
loop();

// Resize
window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
});
</script>
</body>
</html>

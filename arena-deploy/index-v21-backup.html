<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Eclipse Arena v0.21</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;position:absolute;inset:0;z-index:1}
.s{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#0a0808;gap:14px}
.s.h{display:none}
h1{font-size:26px;color:#c8a050}.ss{font-size:11px;color:rgba(200,180,150,.4)}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.cd{width:100px;padding:14px 8px;border-radius:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;transition:all .2s}
.cd:hover{background:rgba(255,255,255,.1);border-color:#c8a050}
.cd.lk{cursor:not-allowed;opacity:.3}.cd.lk:hover{background:rgba(255,255,255,.05)}
.av2{font-size:32px;display:block;margin-bottom:6px}
.lvls{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;width:380px}
.lc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888}
.lc.o{color:#c8b898;background:rgba(200,160,80,.15);cursor:pointer}.lc.o:hover{background:rgba(200,160,80,.25)}
.lc.lk{color:rgba(255,255,255,.08);cursor:not-allowed}.lc.do{color:#5a5}
.btn2{padding:8px 20px;border-radius:12px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(200,180,150,.6);border:1px solid rgba(255,255,255,.1)}
.panel-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.pbtn{padding:10px 24px;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;color:#fff}
.pbtn.primary{background:#5c5}.pbtn.danger{background:#c44}.pbtn.ghost{background:rgba(255,255,255,.06);color:rgba(200,180,150,.6)}
.pbtn.shop{background:rgba(200,160,80,.2);color:#c8a050;border:1px solid rgba(200,160,80,.3)}
.pbtn:hover{transform:scale(1.04)}
.pbtn:disabled{opacity:.3;transform:none}
.panel .title{font-size:30px;font-weight:900}.panel .info{font-size:12px;color:rgba(200,180,150,.4)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin:8px 0}
.shop-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;text-align:center;font-size:11px}
.shop-item .si-icon{font-size:24px;display:block;margin-bottom:4px}
.shop-item .si-name{font-weight:700;color:#c8b898}.shop-item .si-cost{color:rgba(200,180,150,.4);font-size:10px}
</style></head><body>
<canvas id="c"></canvas>
<div id="err" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f44;font-size:20px;z-index:50;text-align:center;pointer-events:none;display:none"></div>

<div class="s" id="m1"><div style="text-align:center">
<h1>ECLIPSE ARENA v0.15</h1><div class="ss">Pick Character</div>
<div class="cards">
<div class="cd" onclick="pick('warrior')"><span class="av2">⚔️</span>Swordsman</div>
<div class="cd" onclick="pick('gunner')"><span class="av2">🔫</span>Gunner</div>
<div class="cd lk"><span class="av2" style="filter:brightness(0)">🔮</span>???</div>
<div class="cd lk"><span class="av2" style="filter:brightness(0)">🗡️</span>???</div>
</div></div></div>

<div class="s h" id="m2"><div style="text-align:center">
<h1 id="m2t">Levels</h1><div class="lvls" id="lg"></div>
<button class="btn2" onclick="back()" style="margin-top:12px">← Back</button>
</div></div>

<div class="s h panel" id="win"><div style="text-align:center">
<div class="title" style="color:#5c5">✨ Level Clear!</div>
<div class="info" id="winInfo"></div>
<div class="panel-btns" style="margin-top:12px">
<button class="pbtn primary" onclick="nextLvl()">▶ Next</button>
<button class="pbtn shop" onclick="openShop()">🛒 Shop</button>
<button class="pbtn ghost" onclick="toLobby()">🏠 Lobby</button>
</div></div></div>

<div class="s h panel" id="go"><div style="text-align:center">
<div class="title" style="color:#c44">💀 Defeated</div>
<div class="info" id="goInfo"></div>
<div class="panel-btns" style="margin-top:12px">
<button class="pbtn danger" onclick="retryLvl()">↺ Retry</button>
<button class="pbtn ghost" onclick="toLobby()">🏠 Lobby</button>
</div></div></div>

<div class="s h panel" id="shop"><div style="text-align:center">
<div class="title" style="color:#c8a050">🛒 Shop</div>
<div class="info" id="shopInfo"></div>
<div class="shop-grid" id="shopGrid"></div>
<button class="pbtn ghost" onclick="closeShop()" style="margin-top:8px">← 返回游戏</button>
</div></div>

<script>
window.onerror=function(m,s,l){document.getElementById('err').style.display='block';document.getElementById('err').textContent='ERROR: '+m+' line '+l;return!1};
try{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;canvas.width=W;canvas.height=H;onresize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight};
let ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.02){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.2,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

const CH={warrior:{n:'Swordsman',ico:'⚔️',c:'#e85a30',hp:200,sp:3.0,acd:28},gunner:{n:'Gunner',ico:'🔫',c:'#4ad8b0',hp:120,sp:3.0,acd:14}};
const ET=[{n:'Infantry',hp:30,sp:2.0,sz:10,dmg:6,sc:100,co:'#e87050'},{n:'Archer',hp:22,sp:2.1,sz:9,dmg:4,sc:120,co:'#e89040',r:!0},{n:'Berserker',hp:18,sp:2.35,sz:8,dmg:10,sc:180,co:'#ff4060'},{n:'Tank',hp:70,sp:2.0,sz:16,dmg:14,sc:300,co:'#b04030'},{n:'Shaman',hp:38,sp:2.1,sz:11,dmg:3,sc:250,co:'#40c060',h:!0},{n:'Toxic',hp:35,sp:2.0,sz:10,dmg:3,sc:200,co:'#40ff40',toxic:!0},{n:'Toxic',hp:30,sp:2.1,sz:10,dmg:3,sc:180,co:'#60ff60',toxic:!0},{n:'Sniper',hp:25,sp:2.0,sz:8,dmg:8,sc:180,co:'#ff8844',r:!0},{n:'Gunner',hp:28,sp:2.1,sz:9,dmg:5,sc:150,co:'#ffaa66',r:!0}];
const IT=[{n:'HP药水',ico:'❤️',c:'#f44',ef:'heal',v:50,cost:200},{n:'速度药剂',ico:'💨',c:'#4af',ef:'speed',v:1.6,dur:300,cost:300},{n:'力量药剂',ico:'💪',c:'#fa0',ef:'dmg',v:1.5,dur:250,cost:400},{n:'护盾',ico:'🛡️',c:'#fff',ef:'shield',v:1,dur:200,cost:500}];

const WCOLORS=['#e8e0d8','#80d880','#68a8e8','#b070e0','#e0b840','#e87830','#e03030'];
const WNAMES=['⬜White','🟩Green','🟦Blue','🟪Purple','🟨Gold','🟧Orange','🟥Red'];
// Warrior: range fixed 60, arc 45°(0.78)→180°(3.14)
const WARCS=[.78,1.05,1.4,1.75,2.1,2.6,3.14];
const WRANGES=60; // fixed

const S=3;const ARENAS=[{v:[[-140,-100],[140,-100],[140,100],[-140,100]].map(v=>[v[0]*S,v[1]*S]),n:'Rectangle',c:['#1a1008','rgba(200,150,80,.3)']},{v:[[0,-110],[100,-50],[60,100],[-60,100],[-100,-50]].map(v=>[v[0]*S,v[1]*S]),n:'Pentagon',c:['#0a1418','rgba(80,180,200,.3)']},{v:[[0,-120],[110,-40],[70,100],[-70,100],[-110,-40]].map(v=>[v[0]*S,v[1]*S]),n:'Star-ish',c:['#141008','rgba(200,120,80,.3)']},{v:[[0,-130],[120,0],[0,130],[-120,0]].map(v=>[v[0]*S,v[1]*S]),n:'Diamond',c:['#0a180a','rgba(120,200,80,.3)']},{v:[[-80,-110],[80,-110],[130,0],[80,110],[-80,110],[-130,0]].map(v=>[v[0]*S,v[1]*S]),n:'Hexagon',c:['#180a18','rgba(180,80,200,.3)']},{v:[[0,-100],[100,-80],[110,30],[60,100],[-60,100],[-110,30],[-100,-80]].map(v=>[v[0]*S,v[1]*S]),n:'Heptagon',c:['#181008','rgba(200,180,80,.3)']},{v:[[-130,-60],[-50,-120],[50,-120],[130,-60],[100,30],[50,80],[-50,80],[-100,30]].map(v=>[v[0]*S,v[1]*S]),n:'Octagon',c:['#0a1018','rgba(100,150,220,.3)']},{v:[[-60,-120],[60,-120],[130,-40],[90,60],[30,110],[-30,110],[-90,60],[-130,-40]].map(v=>[v[0]*S,v[1]*S]),n:'Oval-ish',c:['#100a18','rgba(160,100,220,.3)']}];
let arena=[],arenaName='',arenaColor=['#1a1008','rgba(200,150,80,.3)'];
function pickArena(lv){const a=ARENAS[(lv-1)%ARENAS.length];arena=a.v;arenaName=a.n;arenaColor=a.c}
function insidePoly(x,y){let in2=!1;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const xi=arena[i][0],yi=arena[i][1],xj=arena[j][0],yj=arena[j][1];if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)in2=!in2}return in2}
function clampPoly(x,y,m=4){if(insidePoly(x,y))return[x,y];let bx=x,by=y,bd=Infinity;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const ax=arena[j][0],ay=arena[j][1],bx2=arena[i][0],by2=arena[i][1],dx=bx2-ax,dy=by2-ay,l2=dx*dx+dy*dy;let t=((x-ax)*dx+(y-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=ax+t*dx,py=ay+t*dy,d=Math.hypot(x-px,y-py);if(d<bd){bd=d;const n=Math.sqrt(l2);bx=px+dx/n*m;by=py+dy/n*m}}return[bx,by]}

let ck,cd,run=!1,f=0,lvl=1,pl={alive:!1},en=[],pr=[],pa=[],it=[],sc=0,ki=0,len=0,lk=0,bp=[],bpmax=3,unlocked=1,sx=0,sy=0,si=0;
let weaponLvl=0,spdLvl=0,shopOpen=!1;
try{unlocked=JSON.parse(localStorage.getItem('ea21'))?.unlocked||1}catch(e){}

function weaponTier(){return Math.min(6,weaponLvl)}
function warriorDmg(){const t=weaponTier();return Math.floor(30*(1+t*.3)/3)}
function warriorArc(){return WARCS[weaponTier()]}
function gunnerBullets(){return Math.min(8,2+weaponTier())}
function gunnerDmg(){const t=weaponTier();return Math.floor(30*(1+t*.3)/3*.8)}
function wpnUpgradeCost(){return Math.pow(2,weaponLvl)*500}

const K={},M={x:0,y:0,d:!1};
onkeydown=e=>{K[e.key.toLowerCase()]=!0;ia()};onkeyup=e=>{K[e.key.toLowerCase()]=!1};
canvas.onmousemove=e=>{M.x=e.clientX;M.y=e.clientY};
canvas.onmousedown=e=>{if(e.button===0){M.d=!0;ia()}};canvas.onmouseup=e=>{if(e.button===0)M.d=!1};

function pick(key){ck=key;cd=CH[key];ia();document.getElementById('m1').classList.add('h');document.getElementById('m2').classList.remove('h');document.getElementById('m2t').textContent=cd.ico+' '+cd.n;buildLvlGrid()}
function back(){document.getElementById('m2').classList.add('h');document.getElementById('m1').classList.remove('h')}
function buildLvlGrid(){const g=document.getElementById('lg');g.innerHTML='';for(let i=1;i<=64;i++){const c=document.createElement('div');c.className='lc';c.textContent=i;if(i<=unlocked){c.classList.add('o');c.onclick=function(){go(parseInt(this.textContent))}}else{c.classList.add('lk');c.textContent='🔒'}if(i<unlocked)c.classList.add('do');g.appendChild(c)}}
function toLobby(){['win','go','shop'].forEach(id=>document.getElementById(id).classList.add('h'));document.getElementById('m2').classList.remove('h');buildLvlGrid();shopOpen=!1}

function go(lv){lvl=lv;pickArena(lv);ia();['m1','m2','win','go','shop'].forEach(id=>document.getElementById(id).classList.add('h'));shopOpen=!1;
  pl={x:0,y:0,hp:cd.hp,mh:cd.hp,ang:Math.PI/2,alive:!0,stealth:!1,at:0,acd:0,inv:0,s1cd:0,s2cd:0,qcd:0,dt:0,dvx:0,dvy:0,sb:0,db:0,shT:0,defBuff:0};
  en=[];pr=[];pa=[];it=[];bp=[];sc=0;ki=0;lk=0;f=0;len=Math.floor(8+lv*3);
  for(let i=0;i<len;i++)sE();for(let i=0;i<2+Math.floor(Math.random()*3);i++)sI();run=!0}
function nextLvl(){document.getElementById('win').classList.add('h');go(lvl+1)}
function retryLvl(){document.getElementById('go').classList.add('h');go(lvl)}

// Shop
function openShop(){shopOpen=!0;run=!1;hideAllPanels();document.getElementById('shop').classList.remove('h');buildShop()}
function closeShop(){document.getElementById('shop').classList.add('h');shopOpen=!1;run=!0}
function hideAllPanels(){['win','go','shop'].forEach(id=>document.getElementById(id).classList.add('h'))}
function buildShop(){
  document.getElementById('shopInfo').textContent='Score: '+sc+' | Kills: '+ki+' | Weapon: '+WNAMES[weaponTier()]+' | B key to open';
  const g=document.getElementById('shopGrid');g.innerHTML='';
  // Weapon upgrade
  const uc=wpnUpgradeCost(),canUp=weaponLvl<6&&sc>=uc;
  g.innerHTML+=`<div class="shop-item"><span class="si-icon">⚡</span><span class="si-name">Upgrade Weapon → ${WNAMES[Math.min(6,weaponLvl+1)]}</span><span class="si-cost">${uc} pts</span><button class="pbtn shop" style="margin-top:4px;font-size:11px;padding:6px 14px" ${canUp?'onclick="buyUpgrade()"':'disabled'}>${canUp?'Buy':'Not enough'}</button></div>`;
  const sc2=Math.floor(wpnUpgradeCost()/2),canSpd=sc>=sc2;g.innerHTML+=`<div class="shop-item"><span class="si-icon">👟</span><span class="si-name">Speed +10% (Lv${spdLvl}) → Lv${spdLvl+1}</span><span class="si-cost">${sc2} pts</span><button class="pbtn shop" style="margin-top:4px;font-size:11px;padding:6px 14px" ${canSpd?'onclick="buySpeed()"':'disabled'}>${canSpd?'Buy':'Not enough'}</button></div>`;
  // Items
  IT.forEach(t=>{const canBuy=sc>=t.cost;g.innerHTML+=`<div class="shop-item"><span class="si-icon">${t.ico}</span><span class="si-name">${t.n}</span><span class="si-cost">${t.cost} pts</span><button class="pbtn shop" style="margin-top:4px;font-size:11px;padding:6px 14px" ${canBuy?'onclick="buyItem('+IT.indexOf(t)+')"':'disabled'}>${canBuy?'Buy':'Not enough'}</button></div>`})}
function buyUpgrade(){if(sc>=wpnUpgradeCost()&&weaponLvl<6){sc-=wpnUpgradeCost();weaponLvl++;buildShop()}}
function buySpeed(){const cost=Math.floor(wpnUpgradeCost()/2);if(sc>=cost){sc-=cost;spdLvl++;buildShop()}}
function buyItem(idx){if(sc>=IT[idx].cost){sc-=IT[idx].cost;use(IT[idx]);buildShop()}}

function sE(){const ei=Math.floor(Math.random()*arena.length),j=(ei+1)%arena.length,t=Math.random();const sx=arena[ei][0]+(arena[j][0]-arena[ei][0])*t,sy=arena[ei][1]+(arena[j][1]-arena[ei][1])*t;const ang2=Math.atan2(pl.y-sy,pl.x-sx);const et=ET[Math.floor(Math.random()*ET.length)],hm=1+lvl*.05;en.push({x:sx+Math.cos(ang2)*140,y:sy+Math.sin(ang2)*25,hp:Math.floor(et.hp*hm),mh:Math.floor(et.hp*hm),sp:et.sp*(1+lvl*.02),sz:et.sz,dmg:Math.floor(et.dmg*(1+lvl*.03)),co:et.co,sc:Math.floor(et.sc*(1+lvl*.04)),r:et.r||!1,h:et.h||!1,shCD:0,hCD:0,stun:0,alive:!0})}
function sI(){const a=Math.random()*Math.PI*2;const t=IT[Math.floor(Math.random()*IT.length)];it.push({x:pl.x+Math.cos(a)*(30+Math.random()*100),y:pl.y+Math.sin(a)*(30+Math.random()*100),type:t,l:500})}

function sp(x,y,n,c,s=3,l=16,z=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=Math.random()*s+s*.3;pa.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,l,maxL:l,c,size:Math.random()*z+z*.5})}}
function se(x,y,r,c){pa.push({x,y,vx:0,vy:0,l:10,maxL:10,c,size:r,isEf:!0})}
function sf2(x,y,t,c='#fff'){pa.push({x,y,vx:0,vy:-2,l:28,maxL:28,c,text:t,isTxt:!0})}
function ash(i){si=Math.max(si,i)}

function dmgE(e2,dmg){e2.hp-=dmg;e2.stun=10;sp(e2.x,e2.y,5,e2.co,3,8,2);sf2(e2.x,e2.y-8,''+Math.round(dmg));ash(2);if(e2.hp<=0){e2.alive=!1;sp(e2.x,e2.y,15,e2.co,6,18,4);sf2(e2.x,e2.y-16,'+'+e2.sc,cd.c);sc+=e2.sc;ki++;lk++;ash(3)}}
function hitP(dmg){if(pl.shT>0)return;const fdmg=pl.defBuff>0?dmg*.5:dmg;pl.hp-=fdmg;pl.inv=25;sp(pl.x,pl.y,10,'#f44',6,14,3);sf2(pl.x,pl.y-8,'-'+Math.round(fdmg),'#f44');ash(7);if(pl.hp<=0){pl.hp=0;pl.alive=!1;run=!1;gameOver()}}
function lvlClear(){run=!1;if(lvl>=unlocked){unlocked=lvl+1;localStorage.setItem('ea21',JSON.stringify({unlocked}))}document.getElementById('win').classList.remove('h');document.getElementById('winInfo').textContent='Level '+lvl+' · '+cd.n+' · '+sc+' pts · '+arenaName}
function gameOver(){document.getElementById('go').classList.remove('h');document.getElementById('goInfo').textContent='Level '+lvl+' · '+cd.n+' · Kills '+ki}

function pickup(i){const o=it[i];if(bp.length<bpmax){bp.push(o.type)}else{use(o.type)}it.splice(i,1)}
function use(t){if(t.ef==='heal')pl.hp=Math.min(pl.mh,pl.hp+t.v);else if(t.ef==='speed')pl.sb=t.dur;else if(t.ef==='dmg')pl.db=t.dur;else pl.shT=t.dur;sf2(pl.x,pl.y-8,t.ico+' '+t.n+'!',t.c)}

function U(dt){
  if(!run)return;f++;dt=Math.min(dt,.15);
  // Shop toggle
  if(K.b){K.b=!1;openShop();return}
  if(pl.acd>0)pl.acd-=dt*60;if(pl.at>0)pl.at-=dt;if(pl.s1cd>0)pl.s1cd--;if(pl.s2cd>0)pl.s2cd--;if(pl.inv>0)pl.inv--;if(pl.qcd>0)pl.qcd--;
  if(pl.sb>0)pl.sb-=dt*60;if(pl.db>0)pl.db-=dt*60;if(pl.shT>0)pl.shT-=dt*60;if(pl.defBuff>0)pl.defBuff-=dt*60;
  pl.stealth=K.control||K.ctrl;const spd=cd.sp*(1+spdLvl*.1)*(pl.sb>0?1.6:1)*(pl.stealth?.4:1);
  if(pl.dt>0){pl.x+=pl.dvx*dt;pl.y+=pl.dvy*dt;pl.dt--}
  let mx=0,my=0;if(K.w||K.arrowup)my=-1;if(K.s||K.arrowdown)my=1;if(K.a||K.arrowleft)mx=-1;if(K.d||K.arrowright)mx=1;
  if(mx||my){const l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;pl.ang=Math.atan2(my,mx)}
  if(pl.dt<=0){pl.x+=mx*spd*dt*60;pl.y+=my*spd*dt*60}
  if(!insidePoly(pl.x,pl.y)){pl.hp-=20*dt;if(f%8===0){sp(pl.x,pl.y,3,'#f44',4,10,3);sf2(pl.x,pl.y-8,'-20/s','#f44')}}
  for(let i=it.length-1;i>=0;i--){if(Math.hypot(it[i].x-pl.x,it[i].y-pl.y)<8){pickup(i);break}}
  if(K.f){K.f=!1;for(let i=it.length-1;i>=0;i--){if(Math.hypot(it[i].x-pl.x,it[i].y-pl.y)<12){pickup(i);break}}}
  if(K['1']&&bp.length>0){K['1']=!1;use(bp.shift())}if(K['2']&&bp.length>0){K['2']=!1;use(bp.shift())}if(K['3']&&bp.length>0){K['3']=!1;use(bp.shift())}
  it=it.filter(o=>{o.l-=dt*60;return o.l>0});

  const wdmg=ck==='warrior'?warriorDmg():gunnerDmg();
  const edmg=(pl.db>0?1.5:1)*wdmg;
  const warc=warriorArc();

  if(M.d&&pl.acd<=0&&pl.dt<=0){ia();pl.acd=cd.acd;pl.at=.2;

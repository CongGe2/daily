<script>

try{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;canvas.width=W;canvas.height=H;onresize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight};

let ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.02){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.2,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

const CH={warrior:{n:'Swordsman',ico:'⚔️',c:'#e85a30',hp:200,sp:3.0,acd:28},gunner:{n:'Gunner',ico:'🔫',c:'#4ad8b0',hp:120,sp:3.0,acd:14}};

// Upgradeable shop items: each has levels with scaling effects
const SHOP_ITEMS=[{n:'Heal Boost',ico:'❤️',desc:'Heal amount',vals:[40,60,80,100,130,160,200],costs:[300,600,1200,2400,4800,9600],maxLv:6,lv:0},
  {n:'Speed Boost',ico:'💨',desc:'Speed duration',vals:[4,6,8,10,13,16],costs:[400,800,1600,3200,6400,12800],maxLv:6,lv:0},
  {n:'Power Boost',ico:'💪',desc:'DMG multiplier',vals:[1.4,1.6,1.8,2.0,2.3,2.6],costs:[500,1000,2000,4000,8000,16000],maxLv:6,lv:0},
  {n:'Shield Boost',ico:'🛡️',desc:'Shield duration',vals:[3,5,7,9,12,15],costs:[600,1200,2400,4800,9600,19200],maxLv:6,lv:0},
  {n:'Auto Aim',ico:'🎯',desc:'Face nearest enemy',vals:[1],costs:[10000],maxLv:1,lv:0,once:!0,onBuy(){autoAim=!0}}];
const WCOLORS=['#e8e0d8','#80d880','#68a8e8','#b070e0','#e0b840','#e87830','#e03030'];
const WNAMES=['⬜White','🟩Green','🟦Blue','🟪Purple','🟨Gold','🟧Orange','🟥Red'];
const WARCS=[.78,1.05,1.4,1.75,2.1,2.6,3.14];
const WRANGES=60;
const ARENA_COLORS=[['#1a1008','rgba(200,150,80,.3)'],['#0a1418','rgba(80,180,200,.3)'],['#141008','rgba(200,120,80,.3)'],['#0a180a','rgba(120,200,80,.3)'],['#180a18','rgba(180,80,200,.3)'],['#181008','rgba(200,180,80,.3)'],['#0a1018','rgba(100,150,220,.3)'],['#100a18','rgba(160,100,220,.3)'],['#180a0a','rgba(220,80,80,.3)'],['#0a180a','rgba(80,220,120,.3)'],['#1a1808','rgba(200,200,80,.3)'],['#0a0a18','rgba(100,100,220,.3)']];
// Level modifiers
const MODS=[null,{n:'☠️Toxic',toxicAll:!0},{n:'👥Double',countMul:2},{n:'💀Death',dmgMul:2},{n:'🛡️Tank',hpMul:2},{n:'🔮Mystic',countMul:1.5,hpMul:1.5},{n:'💪Power',dmgMul:1.5,hpMul:.7},{n:'🔥Frenzy',countMul:1.3,dmgMul:1.3}];
const S=3;const ARENAS=[{v:[[-140,-100],[140,-100],[140,100],[-140,100]].map(v=>[v[0]*S,v[1]*S]),n:'Rectangle',c:ARENA_COLORS[0]},{v:[[0,-110],[100,-50],[60,100],[-60,100],[-100,-50]].map(v=>[v[0]*S,v[1]*S]),n:'Pentagon',c:['#0a1418','rgba(80,180,200,.3)']},{v:[[0,-120],[110,-40],[70,100],[-70,100],[-110,-40]].map(v=>[v[0]*S,v[1]*S]),n:'Star-ish',c:['#141008','rgba(200,120,80,.3)']},{v:[[0,-130],[120,0],[0,130],[-120,0]].map(v=>[v[0]*S,v[1]*S]),n:'Diamond',c:['#0a180a','rgba(120,200,80,.3)']},{v:[[-80,-110],[80,-110],[130,0],[80,110],[-80,110],[-130,0]].map(v=>[v[0]*S,v[1]*S]),n:'Hexagon',c:['#180a18','rgba(180,80,200,.3)']},{v:[[0,-100],[100,-80],[110,30],[60,100],[-60,100],[-110,30],[-100,-80]].map(v=>[v[0]*S,v[1]*S]),n:'Heptagon',c:['#181008','rgba(200,180,80,.3)']},{v:[[-130,-60],[-50,-120],[50,-120],[130,-60],[100,30],[50,80],[-50,80],[-100,30]].map(v=>[v[0]*S,v[1]*S]),n:'Octagon',c:['#0a1018','rgba(100,150,220,.3)']},{v:[[-60,-120],[60,-120],[130,-40],[90,60],[30,110],[-30,110],[-90,60],[-130,-40]].map(v=>[v[0]*S,v[1]*S]),n:'Oval-ish',c:['#100a18','rgba(160,100,220,.3)']}];
let arena=[],arenaName='',arenaColor=['#1a1008','rgba(200,150,80,.3)'],levelMod=null,isBoss=!1;
function pickArena(lv){const a=ARENAS[(lv-1)%ARENAS.length];arena=a.v;arenaName=a.n;arenaColor=ARENA_COLORS[(lv-1)%ARENA_COLORS.length];levelMod=lv%10===0?null:MODS[(lv-1)%MODS.length];isBoss=lv%10===0}
function insidePoly(x,y){let in2=!1;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const xi=arena[i][0],yi=arena[i][1],xj=arena[j][0],yj=arena[j][1];if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)in2=!in2}return in2}
function clampPoly(x,y,m=4){if(insidePoly(x,y))return[x,y];let bx=x,by=y,bd=Infinity;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const ax=arena[j][0],ay=arena[j][1],bx2=arena[i][0],by2=arena[i][1],dx=bx2-ax,dy=by2-ay,l2=dx*dx+dy*dy;let t=((x-ax)*dx+(y-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=ax+t*dx,py=ay+t*dy,d=Math.hypot(x-px,y-py);if(d<bd){bd=d;const n=Math.sqrt(l2);bx=px+dx/n*m;by=py+dy/n*m}}return[bx,by]}

let ck,cd,run=!1,f=0,lvl=1,pl={alive:!1},en=[],pr=[],pa=[],it=[],sc=0,ki=0,len=0,lk=0,bp=[],bpmax=3,unlocked=1,sx=0,sy=0,si=0;
let weaponLvl=0,spdLvl=0,autoAim=isMobile,shopOpen=!1,combo=0,comboTimer=0,maxCombo=0;
try{unlocked=JSON.parse(localStorage.getItem('ea26'))?.unlocked||1}catch(e){}

function weaponTier(){return Math.min(6,weaponLvl)}
function warriorDmg(){const t=weaponTier();return Math.floor(30*(1+t*.3)/3)}
function warriorArc(){return WARCS[weaponTier()]}
function gunnerBullets(){return Math.min(8,2+weaponTier())}
function gunnerDmg(){const t=weaponTier();return Math.floor(30*(1+t*.3)/3*.8)}
function wpnUpgradeCost(){return Math.pow(2,weaponLvl)*500}

// MOBILE INPUT
let joyActive=!1,joyDX=0,joyDY=0;
if(isMobile){
  const jz=document.getElementById('joystickZone'),jt=document.getElementById('joystickThumb');
  jz.addEventListener('pointerdown',e=>{joyActive=!0;e.preventDefault()});
  jz.addEventListener('pointermove',e=>{
    if(!joyActive)return;e.preventDefault();
    const r=jz.getBoundingClientRect(),cx2=r.left+r.width/2,cy2=r.top+r.height/2;
    let dx=e.clientX-cx2,dy=e.clientY-cy2;const dist=Math.hypot(dx,dy),maxR=r.width/2-30;
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR}
    joyDX=dx/maxR;joyDY=dy/maxR;jt.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`});

  document.getElementById('atkBtn').addEventListener('pointerdown',e=>{M.d=!0;ia();e.preventDefault()});

  sbs[2].addEventListener('pointerdown',e=>{K.e=!0;ia();e.preventDefault()});sbs[2].addEventListener('pointerup',()=>{K.e=!1});
}

const K={},M={x:0,y:0,d:!1};
onkeydown=e=>{K[e.key.toLowerCase()]=!0;ia()};onkeyup=e=>{K[e.key.toLowerCase()]=!1};

function pick(key){ck=key;cd=CH[key];ia();document.getElementById('m1').classList.add('h');document.getElementById('m2').classList.remove('h');document.getElementById('m2t').textContent=cd.ico+' '+cd.n;buildLvlGrid()}

function buildLvlGrid(){const g=document.getElementById('lg');g.innerHTML='';for(let i=1;i<=64;i++){const c=document.createElement('div');c.className='lc';c.textContent=i;let label='';if(i%10===0)label='<span class="level-tag boss-tag">BOSS</span>';else{const m=MODS[(i-1)%MODS.length];if(m)label='<span class="level-tag mod-tag">'+m.n+'</span>'}if(i<=unlocked){c.classList.add('o');if(i%10===0)c.classList.add('boss');c.innerHTML=i+label;c.onclick=function(){go(parseInt(this.textContent))}}else{c.classList.add('lk');c.textContent='🔒'}if(i<unlocked)c.classList.add('do');g.appendChild(c)}}

function go(lv){lvl=lv;pickArena(lv);ia();['m1','m2','win','go','shop'].forEach(id=>document.getElementById(id).classList.add('h'));shopOpen=!1;
  pl={x:0,y:0,hp:cd.hp,mh:cd.hp,ang:Math.PI/2,alive:!0,stealth:!1,at:0,acd:0,inv:0,s1cd:0,s2cd:0,qcd:0,dt:0,dvx:0,dvy:0,sb:0,db:0,shT:0,defBuff:0};

  const cm=levelMod?levelMod.countMul||1:1;len=Math.floor((isBoss?4:(8+lv*3))*cm);
  for(let i=0;i<len;i++)sE(isBoss&&i===0);for(let i=0;i<2+Math.floor(Math.random()*3);i++)sI();run=!0}

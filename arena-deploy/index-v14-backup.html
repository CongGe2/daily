<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Eclipse Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;position:absolute;inset:0;z-index:1}
.s{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#0a0808;gap:14px}
.s.h{display:none}
h1{font-size:28px;color:#c8a050}.ss{font-size:11px;color:rgba(200,180,150,.4)}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.cd{width:100px;padding:14px 8px;border-radius:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;transition:all .2s}
.cd:hover{background:rgba(255,255,255,.1);border-color:#c8a050}
.cd.lk{cursor:not-allowed;opacity:.3}.cd.lk:hover{background:rgba(255,255,255,.05)}
.av2{font-size:32px;display:block;margin-bottom:6px}
.lvls{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;width:380px}
.lc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888}
.lc.o{color:#c8b898;background:rgba(200,160,80,.15);cursor:pointer}.lc.o:hover{background:rgba(200,160,80,.25)}
.lc.lk{color:rgba(255,255,255,.08);cursor:not-allowed}.lc.do{color:#5a5}
.btn2{padding:8px 20px;border-radius:12px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(200,180,150,.6);border:1px solid rgba(255,255,255,.1)}
.panel-btns{display:flex;gap:12px}
.pbtn{padding:12px 28px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.pbtn.primary{background:#5c5;color:#0a0a08}.pbtn.danger{background:#c44;color:#fff}.pbtn.ghost{background:rgba(255,255,255,.06);color:rgba(200,180,150,.6)}
.pbtn:hover{transform:scale(1.04)}
.panel .title{font-size:32px;font-weight:900}.panel .info{font-size:13px;color:rgba(200,180,150,.4)}
</style></head><body>
<canvas id="c"></canvas>
<div id="err" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#f44;font-size:20px;z-index:50;text-align:center;pointer-events:none;display:none"></div>

<div class="s" id="m1"><div style="text-align:center">
<h1>ECLIPSE ARENA</h1><div class="ss">Pick Character</div>
<div class="cards">
<div class="cd" onclick="pick('warrior')"><span class="av2">⚔️</span>Swordsman</div>
<div class="cd" onclick="pick('gunner')"><span class="av2">🔫</span>Gunner</div>
<div class="cd lk"><span class="av2" style="filter:brightness(0)">🔮</span>Mage</div>
<div class="cd lk"><span class="av2" style="filter:brightness(0)">🗡️</span>Rogue</div>
</div></div></div>

<div class="s h" id="m2"><div style="text-align:center">
<h1 id="m2t">Levels</h1><div class="lvls" id="lg"></div>
<button class="btn2" onclick="back()" style="margin-top:12px">← Back</button>
</div></div>

<div class="s h panel" id="win"><div style="text-align:center">
<div class="title" style="color:#5c5;text-shadow:0 0 30px rgba(80,200,80,.3)">✨ Level Clear!</div>
<div class="info" id="winInfo"></div>
<div class="panel-btns" style="margin-top:16px">
<button class="pbtn primary" onclick="nextLvl()">▶ Next</button>
<button class="pbtn ghost" onclick="toLobby()">🏠 Lobby</button>
</div></div></div>

<div class="s h panel" id="go"><div style="text-align:center">
<div class="title" style="color:#c44">💀 Defeated</div>
<div class="info" id="goInfo"></div>
<div class="panel-btns" style="margin-top:16px">
<button class="pbtn danger" onclick="retryLvl()">↺ Retry</button>
<button class="pbtn ghost" onclick="toLobby()">🏠 Lobby</button>
</div></div></div>

<script>
window.onerror=function(m,s,l){document.getElementById('err').style.display='block';document.getElementById('err').textContent='ERROR: '+m+' line '+l;return!1};
try{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;canvas.width=W;canvas.height=H;onresize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight};
let ac;function ia(){if(!ac)try{ac=new AudioContext()}catch(e){}if(ac?.state==='suspended')ac.resume()}
function sfx(f,d,t='square',v=.02){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.2,ac.currentTime+d);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}

// Characters
const CH={warrior:{n:'Swordsman',ico:'⚔️',c:'#e85a30',hp:200,sp:2.5,acd:28},
          gunner:{n:'Gunner',ico:'🔫',c:'#4ad8b0',hp:120,sp:3.0,acd:14}};

const ET=[{n:'步兵',hp:30,sp:.8,sz:10,dmg:6,sc:100,co:'#e87050'},{n:'弓兵',hp:22,sp:.6,sz:9,dmg:4,sc:120,co:'#e89040',r:!0},{n:'狂战',hp:18,sp:1.2,sz:8,dmg:10,sc:180,co:'#ff4060'},{n:'重装',hp:70,sp:.5,sz:16,dmg:14,sc:300,co:'#b04030'},{n:'萨满',hp:38,sp:.7,sz:11,dmg:3,sc:250,co:'#40c060',h:!0}];
const IT=[{n:'HP药水',ico:'❤️',c:'#f44',ef:'heal',v:50},{n:'速度药剂',ico:'💨',c:'#4af',ef:'speed',v:1.6,dur:300},{n:'力量药剂',ico:'💪',c:'#fa0',ef:'dmg',v:1.5,dur:250},{n:'护盾',ico:'🛡️',c:'#fff',ef:'shield',v:1,dur:200}];

// Weapon tiers (color-based, 7 levels)
const WCOLORS=['#e8e0d8','#80d880','#68a8e8','#b070e0','#e0b840','#e87830','#e03030'];
const WNAMES=['⬜白','🟩绿','🟦蓝','🟪紫','🟨金','🟧橙','🟥红'];
// Warrior: range scaling per tier
const WRANGES=[30,50,70,95,120,150,180];
// Base enemy HP for damage calc (using 步兵 hp=30 as baseline, 3 hits to kill)
// warriorDamage = tierEnemyHP / 3, where tierEnemyHP ≈ 30 * (1 + tier*0.3)
// gunnerBulletDamage = tierEnemyHP / 3, bulletCount = 2+tier*1 capped at 8

const ARENAS=[{v:[[-140,-100],[140,-100],[140,100],[-140,100]],n:'Rectangle',c:['#1a1008','rgba(200,150,80,.3)']},{v:[[0,-110],[100,-50],[60,100],[-60,100],[-100,-50]],n:'Pentagon',c:['#0a1418','rgba(80,180,200,.3)']},{v:[[0,-120],[110,-40],[70,100],[-70,100],[-110,-40]],n:'Star-ish',c:['#141008','rgba(200,120,80,.3)']},{v:[[0,-130],[120,0],[0,130],[-120,0]],n:'Diamond',c:['#0a180a','rgba(120,200,80,.3)']},{v:[[-80,-110],[80,-110],[130,0],[80,110],[-80,110],[-130,0]],n:'Hexagon',c:['#180a18','rgba(180,80,200,.3)']},{v:[[0,-100],[100,-80],[110,30],[60,100],[-60,100],[-110,30],[-100,-80]],n:'Heptagon',c:['#181008','rgba(200,180,80,.3)']},{v:[[-130,-60],[-50,-120],[50,-120],[130,-60],[100,30],[50,80],[-50,80],[-100,30]],n:'Octagon',c:['#0a1018','rgba(100,150,220,.3)']},{v:[[-60,-120],[60,-120],[130,-40],[90,60],[30,110],[-30,110],[-90,60],[-130,-40]],n:'Oval-ish',c:['#100a18','rgba(160,100,220,.3)']}];
let arena=[],arenaName='',arenaColor=['#1a1008','rgba(200,150,80,.3)'];
function pickArena(lv){const a=ARENAS[(lv-1)%ARENAS.length];arena=a.v;arenaName=a.n;arenaColor=a.c}
function insidePoly(x,y){let in2=!1;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const xi=arena[i][0],yi=arena[i][1],xj=arena[j][0],yj=arena[j][1];if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)in2=!in2}return in2}
function clampPoly(x,y,m=4){if(insidePoly(x,y))return[x,y];let bx=x,by=y,bd=Infinity;for(let i=0,j=arena.length-1;i<arena.length;j=i++){const ax=arena[j][0],ay=arena[j][1],bx2=arena[i][0],by2=arena[i][1],dx=bx2-ax,dy=by2-ay,l2=dx*dx+dy*dy;let t=((x-ax)*dx+(y-ay)*dy)/l2;t=Math.max(0,Math.min(1,t));const px=ax+t*dx,py=ay+t*dy,d=Math.hypot(x-px,y-py);if(d<bd){bd=d;const n=Math.sqrt(l2);bx=px+dx/n*m;by=py+dy/n*m}}return[bx,by]}

let ck,cd,run=!1,f=0,lvl=1,pl={alive:!1},en=[],pr=[],pa=[],it=[],sc=0,ki=0,len=0,lk=0,bp=[],bpmax=3,unlocked=1,sx=0,sy=0,si=0;
try{unlocked=JSON.parse(localStorage.getItem('ea14'))?.unlocked||1}catch(e){}

function weaponTier(){return Math.min(6,Math.floor((lvl-1)/9))}
function warriorStats(){const t=weaponTier();const baseHP=30*(1+t*.3);return{ar:WRANGES[t],ad:Math.floor(baseHP/3)}}
function gunnerStats(){const t=weaponTier();const baseHP=30*(1+t*.3);return{bullets:Math.min(8,2+t),ad:Math.floor(baseHP/3*.8)}}

const K={},M={x:0,y:0,d:!1};
onkeydown=e=>{K[e.key.toLowerCase()]=!0;ia()};onkeyup=e=>{K[e.key.toLowerCase()]=!1};
canvas.onmousemove=e=>{M.x=e.clientX;M.y=e.clientY};
canvas.onmousedown=e=>{if(e.button===0){M.d=!0;ia()}};canvas.onmouseup=e=>{if(e.button===0)M.d=!1};

function pick(key){ck=key;cd=CH[key];ia();document.getElementById('m1').classList.add('h');document.getElementById('m2').classList.remove('h');document.getElementById('m2t').textContent=cd.ico+' '+cd.n;
  const g=document.getElementById('lg');g.innerHTML='';
  for(let i=1;i<=64;i++){const c=document.createElement('div');c.className='lc';c.textContent=i;
    if(i<=unlocked){c.classList.add('o');c.onclick=function(){go(parseInt(this.textContent))}}else{c.classList.add('lk');c.textContent='🔒'}
    if(i<unlocked)c.classList.add('do');g.appendChild(c)}}
function back(){document.getElementById('m2').classList.add('h');document.getElementById('m1').classList.remove('h')}
function toLobby(){['win','go'].forEach(id=>document.getElementById(id).classList.add('h'));document.getElementById('m2').classList.remove('h');
  const g=document.getElementById('lg');g.innerHTML='';
  for(let i=1;i<=64;i++){const c=document.createElement('div');c.className='lc';c.textContent=i;
    if(i<=unlocked){c.classList.add('o');c.onclick=function(){go(parseInt(this.textContent))}}else{c.classList.add('lk');c.textContent='🔒'}
    if(i<unlocked)c.classList.add('do');g.appendChild(c)}}

function go(lv){lvl=lv;pickArena(lv);ia();['m1','m2','win','go'].forEach(id=>document.getElementById(id).classList.add('h'));
  pl={x:0,y:0,hp:cd.hp,mh:cd.hp,ang:Math.PI/2,alive:!0,stealth:!1,at:0,acd:0,inv:0,s1cd:0,s2cd:0,qcd:0,dt:0,dvx:0,dvy:0,sb:0,db:0,shT:0,defBuff:0};
  en=[];pr=[];pa=[];it=[];bp=[];sc=0;ki=0;lk=0;f=0;len=Math.floor(4+lv*1.5);
  for(let i=0;i<len;i++)sE();for(let i=0;i<2+Math.floor(Math.random()*3);i++)sI();run=!0}
function nextLvl(){document.getElementById('win').classList.add('h');go(lvl+1)}
function retryLvl(){document.getElementById('go').classList.add('h');go(lvl)}

function sE(){const ei=Math.floor(Math.random()*arena.length),j=(ei+1)%arena.length,t=Math.random();const sx=arena[ei][0]+(arena[j][0]-arena[ei][0])*t,sy=arena[ei][1]+(arena[j][1]-arena[ei][1])*t;const ang2=Math.atan2(pl.y-sy,pl.x-sx);const et=ET[Math.floor(Math.random()*ET.length)],hm=1+lvl*.05;en.push({x:sx+Math.cos(ang2)*25,y:sy+Math.sin(ang2)*25,hp:Math.floor(et.hp*hm),mh:Math.floor(et.hp*hm),sp:et.sp*(1+lvl*.03),sz:et.sz,dmg:Math.floor(et.dmg*(1+lvl*.03)),co:et.co,sc:Math.floor(et.sc*(1+lvl*.04)),r:et.r||!1,h:et.h||!1,shCD:0,hCD:0,stun:0,alive:!0})}
function sI(){const a=Math.random()*Math.PI*2;const t=IT[Math.floor(Math.random()*IT.length)];it.push({x:pl.x+Math.cos(a)*(30+Math.random()*100),y:pl.y+Math.sin(a)*(30+Math.random()*100),type:t,l:500})}

function sp(x,y,n,c,s=3,l=16,z=3){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=Math.random()*s+s*.3;pa.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,l,maxL:l,c,size:Math.random()*z+z*.5})}}
function se(x,y,r,c){pa.push({x,y,vx:0,vy:0,l:10,maxL:10,c,size:r,isEf:!0})}
function sf2(x,y,t,c='#fff'){pa.push({x,y,vx:0,vy:-2,l:28,maxL:28,c,text:t,isTxt:!0})}
function ash(i){si=Math.max(si,i)}

function dmgE(e2,dmg){e2.hp-=dmg;e2.stun=10;sp(e2.x,e2.y,5,e2.co,3,8,2);sf2(e2.x,e2.y-8,''+Math.round(dmg));ash(2);if(e2.hp<=0){e2.alive=!1;sp(e2.x,e2.y,15,e2.co,6,18,4);sf2(e2.x,e2.y-16,'+'+e2.sc,cd.c);sc+=e2.sc;ki++;lk++;ash(3)}}
function hitP(dmg){if(pl.shT>0)return;const fdmg=pl.defBuff>0?dmg*.5:dmg;pl.hp-=fdmg;pl.inv=25;sp(pl.x,pl.y,10,'#f44',6,14,3);sf2(pl.x,pl.y-8,'-'+Math.round(fdmg),'#f44');ash(7);if(pl.hp<=0){pl.hp=0;pl.alive=!1;run=!1;gameOver()}}
function lvlClear(){run=!1;if(lvl>=unlocked){unlocked=lvl+1;localStorage.setItem('ea14',JSON.stringify({unlocked}))}document.getElementById('win').classList.remove('h');document.getElementById('winInfo').textContent='Level '+lvl+' · '+cd.n+' · '+sc+' pts · '+arenaName+' · 武器 '+WNAMES[weaponTier()]}
function gameOver(){document.getElementById('go').classList.remove('h');document.getElementById('goInfo').textContent='Level '+lvl+' · '+cd.n+' · Kills '+ki}

function pickup(i){const o=it[i];if(bp.length<bpmax){bp.push(o.type)}else{use(o.type)}it.splice(i,1)}
function use(t){if(t.ef==='heal')pl.hp=Math.min(pl.mh,pl.hp+t.v);else if(t.ef==='speed')pl.sb=t.dur;else if(t.ef==='dmg')pl.db=t.dur;else pl.shT=t.dur;sf2(pl.x,pl.y-8,t.ico+' '+t.n+'!',t.c)}

function U(dt){
  if(!run)return;f++;dt=Math.min(dt,.15);
  if(pl.acd>0)pl.acd-=dt*60;if(pl.at>0)pl.at-=dt;if(pl.s1cd>0)pl.s1cd--;if(pl.s2cd>0)pl.s2cd--;if(pl.inv>0)pl.inv--;
  if(pl.sb>0)pl.sb-=dt*60;if(pl.db>0)pl.db-=dt*60;if(pl.shT>0)pl.shT-=dt*60;if(pl.qcd>0)pl.qcd--;if(pl.defBuff>0)pl.defBuff-=dt*60;
  pl.stealth=K.control||K.ctrl;const spd=cd.sp*(pl.sb>0?1.6:1)*(pl.stealth?.4:1);
  if(pl.dt>0){pl.x+=pl.dvx*dt;pl.y+=pl.dvy*dt;pl.dt--}
  let mx=0,my=0;if(K.w||K.arrowup)my=-1;if(K.s||K.arrowdown)my=1;if(K.a||K.arrowleft)mx=-1;if(K.d||K.arrowright)mx=1;
  if(mx||my){const l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;pl.ang=Math.atan2(my,mx)}
  if(pl.dt<=0){pl.x+=mx*spd*dt*60;pl.y+=my*spd*dt*60}
  const[pnx,pny]=clampPoly(pl.x,pl.y,6);pl.x=pnx;pl.y=pny;
  for(let i=it.length-1;i>=0;i--){if(Math.hypot(it[i].x-pl.x,it[i].y-pl.y)<8){pickup(i);break}}
  if(K.f){K.f=!1;for(let i=it.length-1;i>=0;i--){if(Math.hypot(it[i].x-pl.x,it[i].y-pl.y)<12){pickup(i);break}}}
  if(K['1']&&bp.length>0){K['1']=!1;use(bp.shift())}if(K['2']&&bp.length>0){K['2']=!1;use(bp.shift())}if(K['3']&&bp.length>0){K['3']=!1;use(bp.shift())}
  it=it.filter(o=>{o.l-=dt*60;return o.l>0});

  // Dynamic stats from weapon tier
  const ws=warriorStats(),gs=gunnerStats();
  const edmg=(ck==='warrior'?ws.ad:gs.ad)*(pl.db>0?1.5:1);
  const atkRange=ck==='warrior'?ws.ar:450;

  if(M.d&&pl.acd<=0&&pl.dt<=0){ia();pl.acd=cd.acd;pl.at=.2;
    if(ck==='warrior'){const arc=1.2;en.forEach(e2=>{if(!e2.alive)return;const dx=e2.x-pl.x,dy=e2.y-pl.y,dist=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);let diff=ang-pl.ang;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;if(dist<atkRange&&Math.abs(diff)<arc){dmgE(e2,edmg);e2.x+=Math.cos(ang)*10;e2.y+=Math.sin(ang)*10}});pa.push({x:pl.x,y:pl.y,vx:0,vy:0,l:8,maxL:8,c:cd.c,size:atkRange,isEf:!0,isArc:!0,ang:pl.ang,arc})}
    else{const ma=Math.atan2(M.y-H/2,M.x-W/2);const bc=gs.bullets;for(let b=0;b<bc;b++){const spread=(Math.random()-.5)*Math.PI/6;pr.push({x:pl.x,y:pl.y,vx:Math.cos(ma+spread)*14,vy:Math.sin(ma+spread)*14,dmg:edmg,co:cd.c,l:60,ar:!0})}}}
  if((K[' ']||K.space)&&pl.s1cd<=0){K[' ']=!1;K.space=!1;pl.s1cd=120;ia();
    if(ck==='warrior'){pl.dt=10;pl.dvx=Math.cos(pl.ang)*18;pl.dvy=Math.sin(pl.ang)*18;pl.inv=10;sfx(600,.06,'triangle');en.forEach(e2=>{if(!e2.alive)return;if(Math.hypot(e2.x-pl.x,e2.y-pl.y)<110){dmgE(e2,edmg*1.5);e2.stun=14}})}
    else{pl.dt=8;pl.dvx=Math.cos(pl.ang)*16;pl.dvy=Math.sin(pl.ang)*16;pl.inv=8;sfx(600,.06,'triangle')}}
  if(K.e&&pl.s2cd<=0){K.e=!1;pl.s2cd=170;ia();
    if(ck==='warrior'){sfx(30,.2,'sawtooth',.1);se(pl.x,pl.y,130,'#fff');sp(pl.x,pl.y,28,cd.c,7,22);ash(12);en.forEach(e2=>{if(!e2.alive)return;if(Math.hypot(e2.x-pl.x,e2.y-pl.y)<130){dmgE(e2,edmg*2.5);e2.stun=20}})}
    else{for(let i=-2;i<=2;i++)pr.push({x:pl.x,y:pl.y,vx:Math.cos(pl.ang+i*.18)*12,vy:Math.sin(pl.ang+i*.18)*12,dmg:edmg*1.3,co:cd.c,l:60,ar:!0});sfx(500,.04,'square')}}
  if(K.q&&pl.qcd<=0){K.q=!1;pl.qcd=300;ia();if(ck==='warrior'){pl.defBuff=120;sfx(200,.15,'triangle',.06);sf2(pl.x,pl.y-5,'🛡️ 50%减伤!','#fff')}else{for(let i=0;i<10;i++){const a=i*Math.PI*2/10;pr.push({x:pl.x,y:pl.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:edmg*.8,co:cd.c,l:120,ar:!0,orb:!0,orbA:a,orbR:35,orbS:.04})};sfx(600,.1,'sine',.04)}}
  pr=pr.filter(p2=>{if(p2.orb){p2.orbA+=p2.orbS*dt*60;p2.x=pl.x+Math.cos(p2.orbA)*p2.orbR;p2.y=pl.y+Math.sin(p2.orbA)*p2.orbR}else{p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60}p2.l--;if(p2.l<=0)return!1;
    if(p2.ar&&f%2===0)sp(p2.x,p2.y,1,cd.c+'60',1,3);
    if(p2.en){if(Math.hypot(p2.x-pl.x,p2.y-pl.y)<14&&pl.inv<=0&&pl.dt<=0&&pl.alive){hitP(p2.dmg);return!1}return!0}
    for(let i=en.length-1;i>=0;i--){const e2=en[i];if(!e2.alive)continue;if(Math.hypot(p2.x-e2.x,p2.y-e2.y)<e2.sz+5){dmgE(e2,p2.dmg);if(!e2.alive)en.splice(i,1);return!1}}return!0});
  en.forEach(e2=>{if(!e2.alive)return;if(e2.stun>0){e2.stun--;return}
